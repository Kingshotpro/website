<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signing you in… — KingshotPro</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .auth-wrap {
      max-width: 480px; margin: 80px auto; padding: 32px 28px; text-align: center;
      background: var(--surface-2); border: 1px solid var(--border); border-radius: 14px;
    }
    .auth-wrap h1 { color: var(--gold); font-size: 22px; margin-bottom: 10px; }
    .auth-wrap p  { color: var(--text-muted); font-size: 14px; line-height: 1.6; }
    .auth-spinner {
      width: 36px; height: 36px; margin: 20px auto;
      border: 3px solid var(--border); border-top-color: var(--gold);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .auth-ok, .auth-err { display: none; }
    .auth-ok  { color: #4ade80; }
    .auth-err { color: #f87171; }
    .auth-btn {
      display: inline-block; margin-top: 20px; padding: 10px 22px;
      background: var(--gold); color: var(--bg); border-radius: 8px;
      font-weight: 700; text-decoration: none; font-size: 14px;
    }
  </style>
</head>
<body>
<div class="auth-wrap">
  <div id="auth-pending">
    <h1>Signing you in…</h1>
    <div class="auth-spinner"></div>
    <p id="auth-msg">Verifying your magic link. This takes a second.</p>
  </div>

  <div id="auth-success" class="auth-ok">
    <h1>✓ Signed in</h1>
    <p id="auth-success-msg">Your profile and credits are linked to this email now. You can log in from any device.</p>
    <a href="../index.html" class="auth-btn">Continue →</a>
  </div>

  <div id="auth-error" class="auth-err">
    <h1>Link expired</h1>
    <p id="auth-error-msg">This magic link is no longer valid. Links expire after 10 minutes.</p>
    <a href="../index.html" class="auth-btn">Request a new one</a>
  </div>
</div>

<script>
(function () {
  'use strict';

  var API = 'https://kingshotpro-api.kingshotpro.workers.dev';

  function show(id) {
    ['auth-pending', 'auth-success', 'auth-error'].forEach(function (k) {
      var el = document.getElementById(k);
      if (el) el.style.display = (k === id) ? 'block' : 'none';
    });
  }
  function fail(msg) {
    var el = document.getElementById('auth-error-msg');
    if (el && msg) el.textContent = msg;
    show('auth-error');
  }

  // Extract ?token= from the URL
  var params = new URLSearchParams(window.location.search);
  var token  = params.get('token');
  if (!token) {
    fail('This link is missing its token. Ask for a new magic link.');
    return;
  }

  // If the browser has a previously looked-up Player ID, pass it so the
  // server associates this FID with the new email account. The /auth/verify
  // endpoint reads `fid` out of the body and stores it on the user record
  // (worker/worker.js:181-218).
  var fid = '';
  try { fid = localStorage.getItem('ksp_last_fid') || ''; } catch (e) {}

  fetch(API + '/auth/verify', {
    method:      'POST',
    credentials: 'include',
    headers:     { 'Content-Type': 'application/json' },
    body:        JSON.stringify({ token: token, fid: fid }),
  })
    .then(function (r) { return r.json().then(function (data) { return { ok: r.ok, data: data }; }); })
    .then(function (res) {
      if (!res.ok || res.data.error) {
        fail(res.data.error === 'invalid token'
          ? 'This magic link is expired or already used. Request a fresh one.'
          : 'Sign-in failed. Please try again from the homepage.');
        return;
      }
      // Success. The Worker set the httpOnly ksp_session cookie. The
      // session itself travels in that cookie — but JS can't read it
      // (httpOnly), so the topbar and other UI have no signal that the
      // user is signed in without an extra /user/me endpoint (TODO).
      //
      // Interim: stash the email in localStorage so the UI can show a
      // signed-in state. This IS NOT the source of truth — the cookie
      // is. Sign-out clears all ksp_* keys so this goes with it.
      try {
        // Token is consumed server-side, but the email lives in the
        // token record. We don't have it client-side; infer from the
        // tier response shape if present, else leave as a flag-only.
        localStorage.setItem('ksp_signed_in', '1');
        if (res.data.tier) localStorage.setItem('ksp_tier', res.data.tier);
      } catch (e) {}
      show('auth-success');
    })
    .catch(function () {
      fail('Network error. Try again — your browser may be blocking cookies.');
    });
})();
</script>
</body>
</html>
