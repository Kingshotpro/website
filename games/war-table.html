<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The War Table — KingshotPro</title>
  <meta name="description" content="Test your Kingshot battle instincts. Two armies face off — can you predict the winner? Daily challenge with XP rewards.">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/advisor-orb.css">
  <style>
    .wt-matchup { display: grid; grid-template-columns: 1fr auto 1fr; gap: 16px; align-items: center; margin: 24px 0; }
    .wt-army { background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; }
    .wt-army h3 { color: var(--gold); margin: 0 0 8px; font-size: 18px; }
    .wt-tier { display: inline-block; background: var(--gold); color: var(--bg); font-size: 12px; font-weight: 700; padding: 2px 10px; border-radius: 4px; margin-bottom: 12px; }
    .wt-troops { text-align: left; font-size: 14px; line-height: 2; color: var(--text-muted); }
    .wt-troops strong { color: var(--text); }
    .wt-buff { margin-top: 10px; font-size: 13px; color: var(--gold); font-weight: 600; }
    .wt-vs { font-size: 28px; font-weight: 900; color: var(--text-muted); text-align: center; }
    .wt-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 24px 0; }
    .wt-buttons .btn { padding: 16px; font-size: 15px; }
    .wt-correct { border-color: #4ade80 !important; }
    .wt-wrong { border-color: #f87171 !important; }
    .hidden { display: none; }
    @media (max-width: 640px) {
      .wt-matchup { grid-template-columns: 1fr; }
      .wt-vs { padding: 8px 0; }
      .wt-buttons { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<nav class="nav"><a class="nav-brand" href="../index.html">KingshotPro</a></nav>
<div class="page"><div class="container" style="max-width:800px;">
  <h1 style="color:var(--gold);text-align:center;margin-bottom:8px;">The War Table</h1>
  <p class="text-muted" style="text-align:center;margin-bottom:32px;">Two armies clash. Study their composition. Predict the victor. One chance per day.</p>
  <div id="wt-game"></div>
</div></div>
<footer class="footer"><div class="footer-inner">
  <div><div class="footer-brand">KingshotPro</div>
  <p class="footer-note">Unofficial. Not affiliated with Century Games.</p></div>
</div></footer>
<script src="../js/cookie-consent.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/advisor-names.js"></script>
<script src="../js/advisor.js"></script>
<script src="../js/advisor-orb.js"></script>
<script src="../js/advisor-hooks.js"></script>
<script src="../js/advisor-chat.js"></script>
<script src="../js/advisor-cta.js"></script>
<script src="../js/game-war-table.js"></script>
</body>
</html>
