<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oath and Bone</title>
<!-- Oath and Bone — real engine shell
     Minimal loader. Wires the Phase 1 modules (engine, spells, heroes,
     battles, ai, orchestrator) into a single page with an #oathandbone-game
     container. The renderer module is intentionally NOT loaded here yet —
     the engine exposes hooks (onReady, onUnitMoved, onUnitAttacked,
     onBattleEnd) that a dedicated renderer module (Worker 16) will attach
     to. Opening this URL before Worker 16 ships will show the engine
     loaded state and the banner explaining the renderer is pending.
     Preview with art + interaction lives at /games/oath-and-bone-preview.html. -->
<style>
:root {
  --bg:        #0d0d0f;
  --surface:   #16181f;
  --surface-2: #1e2030;
  --border:    #2a2d3e;
  --gold:      #f0c040;
  --gold-dim:  #c09828;
  --text:      #e8e8ec;
  --text-muted:#7a7d8e;
  --blue:      #5c8ce0;
  --font:      -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
}
#ui-top {
  background: var(--surface);
  border-bottom: 2px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.brand {
  font-size: 14px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.preview-link {
  font-size: 11px;
  color: var(--text-muted);
  text-decoration: none;
  border: 1px solid var(--border);
  padding: 6px 12px;
  border-radius: 3px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.preview-link:hover { color: var(--gold); border-color: var(--gold-dim); }

#oathandbone-game {
  min-height: calc(100vh - 120px);
  padding: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* #engine-status styles removed — renderer (Worker 16) builds the battle UI
   dynamically inside #oathandbone-game via game-oath-and-bone-render.js */

footer {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  font-size: 10px;
  color: var(--text-muted);
  text-align: center;
  letter-spacing: 0.04em;
}
</style>
</head>
<body>

<header id="ui-top">
  <div class="brand">Oath and Bone</div>
  <a class="preview-link" href="/games/oath-and-bone-preview.html">Preview Visual Prototype →</a>
</header>

<main id="oathandbone-game">
  <!-- Battle UI built here by game-oath-and-bone-render.js onReady hook -->
</main>

<footer>Unofficial. Not affiliated with Century Games. &nbsp;·&nbsp; Oath and Bone · Phase 1 engine · Worker 16 renderer</footer>

<!-- ──────────────────────────────────────────────────────── -->
<!-- MODULE LOAD ORDER — dependencies flow left-to-right       -->
<!-- ──────────────────────────────────────────────────────── -->

<!-- Advisor wiring (site-wide; present on all pages) -->
<script src="/js/advisor.js"></script>

<!-- Data modules — heroes, scenarios, spell defs (no inter-dependency) -->
<script src="/js/game-oath-and-bone-heroes.js"></script>
<script src="/js/game-oath-and-bone-battles.js"></script>
<script src="/js/game-oath-and-bone-spells.js"></script>

<!-- AI archetypes (reads spell defs at runtime) -->
<script src="/js/game-oath-and-bone-ai.js"></script>

<!-- Engine (core state machine; reads all data + AI) -->
<script src="/js/game-oath-and-bone-engine.js"></script>

<!-- Renderer (Worker 16) — attaches engine hooks and loads SCENARIO_B1
     BEFORE the orchestrator polls so start() finds a ready scenario. -->
<script src="/js/game-oath-and-bone-render.js"></script>

<!-- Orchestrator (wires advisor + lifecycle; its init() calls engine.start()) -->
<script src="/js/game-oath-and-bone.js"></script>

<script>OathAndBone.init();</script>

</body>
</html>
