    const r = this.run;
    if (!r) return;
    r.runMessages.push({
      text: text,
      timer: 2.0,
      y: 400,
      alpha: 1
    });
    if (r.runMessages.length > 3) r.runMessages.shift();
  },

  spawnEnemy(type, x, y) {
    const r = this.run;
    const defs = {
      wisp:      { hp: 1, speed: 60, size: 12, color: '#8e8eaa', kills: 1 },
      shade:     { hp: 2, speed: 50, size: 16, color: '#5e5e7c', kills: 1 },
      voidling:  { hp: 4, speed: 35, size: 22, color: '#2e203e', kills: 2 },
      swarm:     { hp: 1, speed: 80, size: 8,  color: '#4c4c59', kills: 1 },
      darkknight:{ hp: 120 + Campfire.state.level * 15, speed: 30, size: 60, color: '#201015', kills: 5 }
    };
    const d = defs[type] || defs.wisp;
    r.enemies.push({
      type, x: x ?? (55 + Math.random() * 280), y: y ?? -40,
      hp: d.hp, maxHp: d.hp, speed: d.speed, size: d.size,
      color: d.color, kills: d.kills,
      t: Math.random() * Math.PI * 2, hitFlash: 0, alpha: 1
    });
  },

  spawnGateRow() {
    const r = this.run;
    const cols = 2 + (Math.random() < 0.3 ? 1 : 0);
    const positions = cols === 2 ? [130, 260] : [100, 195, 290];
    positions.forEach(px => {
      const isRed = Math.random() < 0.35;
      const canShoot = isRed && Math.random() < 0.4;
      r.gates.push({
        x: px, y: -60,
        val: isRed ? -(2 + Math.floor(Math.random() * 6)) : 1 + Math.floor(Math.random() * 3),
        isRed, canShoot, active: true, pulse: 0
      });
    });
  },

  spawnCocoon() {
    const r = this.run;
    const abilities = ['Firekeeper', 'Beacon', 'Guardian', 'Stormcaller', 'Seeker'];
    r.cocoons.push({
      x: 80 + Math.random() * 230, y: -50,
      hp: 12 + Math.floor(r.timer / 10) * 3,
      maxHp: 12 + Math.floor(r.timer / 10) * 3,
      ability: abilities[Math.floor(Math.random() * abilities.length)],
      active: true, crackTimer: 0
    });
  },

  update(dt) {
    const r = this.run;
    if (!r) return;

    // Update run messages
    if (r.runMessages) {
      for (let i = r.runMessages.length - 1; i >= 0; i--) {
        const m = r.runMessages[i];
        m.timer -= dt;
        m.y -= dt * 20;
        m.alpha = Math.min(1, m.timer / 0.5);
        if (m.timer <= 0) r.runMessages.splice(i, 1);
      }
    }

    // Slow-mo
    if (r.slowMo > 0) {
      r.slowMo -= dt;
      dt *= 0.3;
    }

    // Invincibility countdown (post-revive window)
    if (r.invincible > 0) r.invincible -= dt;

    // End states
    if (r.gameState === 'GAMEOVER') {
      const inp = Campfire.input;
      if (r.reviveAvailable) {
        // Offer revive window — counts down endTimer (2.5s) as the decision window
        r.endTimer -= dt;
        if (inp.pressed) {
          // Button zone: centered, y=H/2+80, 220×56
          const bx = 195, by = 422 + 80, bw = 220, bh = 56;
          if (Math.abs(inp.x - bx) < bw / 2 && Math.abs(inp.y - by) < bh / 2) {
            if (Campfire.state.coins >= 5) {
              Campfire.state.coins -= 5;
              r.reviveAvailable = false;
              r.group = [];
              for (let i = 0; i < 3; i++) {
                r.group.push({ x: r.playerX + (i - 1) * 16, y: 700, name: null, flash: 1.5 });
              }
              r.gameState = 'RUNNING';
              r.invincible = 2.5;
              r.flash = 0.6; r.flashColor = 'rgba(255,180,80,0.5)';
              return;
            }
          }
        }
        if (r.endTimer <= 0) {
          r.reviveAvailable = false;
          r.endTimer = 1.2; // short pause before hub
        }
        return;
      }
      r.endTimer -= dt;
      if (r.endTimer <= 0) {
        Campfire.state.coins += r.coinsEarned;
        Campfire.state.gems += r.gemsEarned;
        Campfire.modules.economy.gainXP(Math.floor(r.score / 5));
        Campfire.modules.hub.recordScore(r.score);
        Campfire.game.scene = "hub";
        Campfire.modules.hub.subScene = null;
        this.run = null;
      }
      return;
    }

    if (r.gameState === 'VICTORY') {
      const inp = Campfire.input;
      if (r.coinDoubleAvailable) {
        r.endTimer -= dt;
        if (inp.pressed) {
          // Button zone: centered, y=H/2+100, 220×56
          const bx = 195, by = 422 + 100, bw = 220, bh = 56;
          if (Math.abs(inp.x - bx) < bw / 2 && Math.abs(inp.y - by) < bh / 2) {
            if (Campfire.state.coins >= 3) {
              Campfire.state.coins -= 3;
              r.coinDoublePending = true;
              r.coinDoubleAvailable = false;
              r.endTimer = 1.0;
              return;
            }
          }
        }
        if (r.endTimer <= 0) {
          r.coinDoubleAvailable = false;
          r.endTimer = 1.0;
        }
        return;
      }
      r.endTimer -= dt;
      if (r.endTimer <= 0) {
        Campfire.state.coins += r.coinsEarned * (r.coinDoublePending ? 2 : 1);
        Campfire.state.gems += r.gemsEarned;
        Campfire.modules.economy.gainXP(Math.floor(r.score / 5));
        Campfire.modules.hub.recordScore(r.score);
        Campfire.game.scene = "hub";
        Campfire.modules.hub.subScene = null;
        this.run = null;
      }
      return;
    }

    // Timer and decay
    r.timer += dt;
    r.shake = Math.max(0, r.shake - dt * 30);
    r.flash = Math.max(0, r.flash - dt * 3);
    r.roadOffset = (r.roadOffset + r.scrollSpeed * dt) % 40;
    r.bgFarOffset = (r.bgFarOffset + r.scrollSpeed * 0.2 * dt) % 844;
    r.bgMidOffset = (r.bgMidOffset + r.scrollSpeed * 0.5 * dt) % 844;

    // Powerup timer
    if (r.powerup.timer > 0) {
      r.powerup.timer -= dt;
      if (r.powerup.timer <= 0) r.powerup.type = null;
    }

    // Input: drag left/right
    if (Campfire.input.down) {
      r.targetX = Math.max(55 + 30, Math.min(390 - 55 - 30, Campfire.input.x));
    }
    r.playerX += (r.targetX - r.playerX) * 0.12;

    // Active ability button tap (bottom-right, 70×44)
    if (Campfire.input.pressed && !r.activeUsed) {
      const W = 390, abx = W - 55, aby = 780;
      if (Math.abs(Campfire.input.x - abx) < 35 && Math.abs(Campfire.input.y - aby) < 22) {
        const key = r._hero?.active?.key;
        if (key === 'warden_rally') {
          for (let i = 0; i < 4; i++) this.addSoul();
          this.showRunMessage(this._ft('Rally! 4 souls answer the call.', '4 shades rise from the void.'));
          r.activeUsed = true;
        } else if (key === 'paladin_shield') {
          r.powerup = { type: 'Guardian', timer: 999, text: 'Guardian', shieldHits: 5 };
          this.showRunMessage('Guardian shield raised!');
          r.activeUsed = true;
        } else if (key === 'shepherd_cocoon') {
          r.cocoons.forEach(c => {
            if (c.active) {
              c.active = false; c.crackTimer = 0.5;
              Campfire.modules.particles.goldenBurst(c.x, c.y, 10);
              for (let i = 0; i < c.hp; i++) this.addSoul();
            }
          });
          this.showRunMessage('All cocoons cracked open!');
          r.activeUsed = true;
        } else if (key === 'reaper_wipe') {
          if (r.group.length >= 5) {
            this.removeSouls(5);
            r.enemies.forEach(e => Campfire.modules.particles.fireBurst(e.x, e.y, 4));
            r.enemies = [];
            this.showRunMessage('Void consumed them all.');
            r.activeUsed = true;
          } else {
            this.showRunMessage('Need 5 souls to sacrifice.');
          }
        } else if (key === 'broker_bribe') {
          r.activePending = true;
          this.showRunMessage('Next gate is free.');
          r.activeUsed = true;
        } else if (key === 'king_devour') {
          if (r.group.length >= 8) {
            this.removeSouls(8);
            r.scrollSpeed *= 2;
            r._devourTimer = 10;
            this.showRunMessage('Speed of the void — 10 seconds!');
            r.activeUsed = true;
          } else {
            this.showRunMessage('Need 8 souls to devour.');
          }
        }
      }
    }
    // Devour speed-boost countdown
    if (r._devourTimer > 0) {
      r._devourTimer -= dt;
      if (r._devourTimer <= 0) { r.scrollSpeed = 280; r._devourTimer = 0; }
    }

    // --- SPAWNING TIMELINE ---
    if (r.gameState === 'RUNNING') {
      // Continuous enemy spawning
      r.spawnTimer -= dt;
      if (r.spawnTimer <= 0) {
        const intensity = Math.min(1, r.timer / 45);
        const spawnDelay = Math.max(0.3, 1.5 - intensity * 1.2);
        r.spawnTimer = spawnDelay;

        const roll = Math.random();
        if (r.timer > 30 && roll > 0.85) {
          // Voidling
          this.spawnEnemy('voidling');
        } else if (r.timer > 15 && roll > 0.7) {
          // Shade
          this.spawnEnemy('shade');
        } else if (r.timer > 20 && roll > 0.6) {
          // Swarm burst
          const sx = 80 + Math.random() * 230;
          for (let i = 0; i < 3; i++) {
            this.spawnEnemy('swarm', sx + (Math.random() - 0.5) * 30, -30 - Math.random() * 40);
          }
        } else {
          this.spawnEnemy('wisp');
        }
      }

      // Gate rows every ~8 seconds
      r.gateTimer -= dt;
      if (r.gateTimer <= 0) {
        this.spawnGateRow();
        r.gateTimer = 7 + Math.random() * 3;
      }

      // Cocoons every ~14 seconds (starting at 12s)
      if (r.timer > 12) {
        r.cocoonTimer -= dt;
        if (r.cocoonTimer <= 0) {
          this.spawnCocoon();
          r.cocoonTimer = 12 + Math.random() * 5;
          if (!r.shownFirstCocoon) {
            r.shownFirstCocoon = true;
            const dlg = Campfire.modules.dialogue.DIALOGUE.crowdRunner;
            this.showRunMessage(dlg.firstCocoon);
          }
        }
      }

      // Boss at ~48 seconds
      if (r.timer > 48 && !r.bossSpawned) {
        r.gameState = 'BOSS_WARN';
        r.bossSpawnTimer = 2;
        r.shake = 15;
        r.scrollSpeed = 100;
        Campfire.audio?.danger();
        const dlg = Campfire.modules.dialogue.DIALOGUE.crowdRunner;
        Campfire.modules.economy.showMessage(dlg.bossWarn);
        this.showRunMessage(dlg.bossAppear);
      }
    }

    // Boss spawn countdown (game-loop safe, replaces setTimeout)
    if (r.gameState === 'BOSS_WARN') {
      r.bossSpawnTimer -= dt;
      if (r.bossSpawnTimer <= 0) {
        r.gameState = 'BOSS';
        this.spawnEnemy('darkknight', 195, -100);
        r.bossSpawned = true;
      }
    }

    // --- UPDATE GROUP (formation + firing) ---
    const fireRateMult = r.powerup.type === 'Firekeeper' ? 0.5 : 1;
    r.group.forEach((soul, idx) => {
      // Triangle formation
      const row = Math.floor(idx / 5);
      const col = idx % 5 - 2;
      const tx = r.playerX + col * 16;
      const ty = 700 + row * 16;
      soul.x += (tx - soul.x) * 0.18;
      soul.y += (ty - soul.y) * 0.18;
      soul.flash = Math.max(0, soul.flash - dt * 5);

      // Auto-fire — straight up by default, auto-aim only with Seeker powerup
      soul.fireTimer -= dt;
      if (soul.fireTimer <= 0) {
        let vx = 0, vy = -500;
        if (r.powerup.type === 'Seeker') {
          // Seeker buff: aim at nearest enemy
          let nearest = null, nd = 99999;
          for (const e of r.enemies) {
            const d = Math.hypot(soul.x - e.x, soul.y - e.y);
            if (d < nd) { nd = d; nearest = e; }
          }
          if (nearest) {
            const a = Math.atan2(nearest.y - soul.y, nearest.x - soul.x);
            vx = Math.cos(a) * 500;
            vy = Math.sin(a) * 500;
          }
        }
        r.projectiles.push({
          x: soul.x, y: soul.y,
          vx, vy,
          life: 1.2,
          damage: 1 + (r.powerup.type === 'Stormcaller' ? 1 : 0)
        });
        Campfire.audio?.beep(900, 0.02, "triangle", 0.008, -80);
        soul.fireTimer = (0.5 + Math.random() * 0.3) * fireRateMult;
      }
    });

    // --- UPDATE PROJECTILES ---
    for (let i = r.projectiles.length - 1; i >= 0; i--) {
      const p = r.projectiles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.life -= dt;
      if (p.life <= 0 || p.y < -20 || p.y > 870) {
        r.projectiles.splice(i, 1);
        continue;
      }

      // Hit enemies
      for (let j = r.enemies.length - 1; j >= 0; j--) {
        const e = r.enemies[j];
        if (Math.hypot(p.x - e.x, p.y - e.y) < e.size + 6) {
          e.hp -= p.damage;
          e.hitFlash = 0.1;
          r.projectiles.splice(i, 1);

          // Chain lightning for Stormcaller
          if (r.powerup.type === 'Stormcaller' && Math.random() < 0.3) {
            for (const other of r.enemies) {
              if (other !== e && Math.hypot(other.x - e.x, other.y - e.y) < 80) {
                other.hp -= 1;
                other.hitFlash = 0.1;
                Campfire.modules.particles.createParticle(
                  (e.x + other.x) / 2, (e.y + other.y) / 2,
                  0, 0, 0.3, 3, '#88ccff'
                );
              }
            }
          }

          if (e.hp <= 0) {
            // Kill enemy
            const coins = e.type === 'darkknight' ? 20 : e.type === 'voidling' ? 4 : e.type === 'shade' ? 2 : 1;
            r.coinsEarned += coins;
            r.score += coins * 5;
            if (Math.random() < (e.type === 'darkknight' ? 1 : 0.08)) r.gemsEarned += 1;
            // soulDrop passive: Void Reaper harvests souls from enemies
            if (r._hero?.passive?.key === 'soulDrop' && e.type !== 'darkknight') {
              this.addSoul();
              this.showRunMessage(this._ft('A soul is rescued.', 'Soul consumed.'));
            }

            Campfire.audio?.hit();
            Campfire.modules.particles.fireBurst(e.x, e.y, 6);
            r.shake = Math.max(r.shake, e.type === 'darkknight' ? 15 : 2);

            if (e.type === 'darkknight') {
              // Boss killed = victory
              r.gameState = 'VICTORY';
              r.endTimer = 3;
              r.slowMo = 2;
              r.shake = 20;
              Campfire.modules.particles.goldenBurst(e.x, e.y, 40);
              Campfire.audio?.rescue();
              Campfire.audio?.level();
              this.showRunMessage(r.group.length + Campfire.modules.dialogue.DIALOGUE.crowdRunner.victoryLine);
              // Coin rain particles
              for (let k = 0; k < 30; k++) {
                Campfire.modules.particles.createParticle(
                  50 + Math.random() * 290, -20 - Math.random() * 100,
                  (Math.random() - 0.5) * 30, 80 + Math.random() * 60,
                  1.5, 4, '#f2cf73'
                );
              }
            }
            r.enemies.splice(j, 1);
          }
          break;
        }
      }

      // Hit gates (increase positive gate values)
      for (const g of r.gates) {
        if (g.active && !g.isRed && Math.abs(p.x - g.x) < 60 && Math.abs(p.y - g.y) < 25) {
          g.val++;
          g.pulse = 0.3;
          r.projectiles.splice(i, 1);
          Campfire.audio?.click();
          break;
        }
        // Shootable red gates
        if (g.active && g.isRed && g.canShoot && Math.abs(p.x - g.x) < 60 && Math.abs(p.y - g.y) < 25) {
          g.val = Math.min(0, g.val + 1);
          g.pulse = 0.3;
          r.projectiles.splice(i, 1);
          break;
        }
      }

      // Hit cocoons
      for (const c of r.cocoons) {
        if (c.active && Math.abs(p.x - c.x) < 30 && Math.abs(p.y - c.y) < 30) {
          c.hp--;
          r.projectiles.splice(i, 1);
          if (c.hp <= 0) {
            c.active = false;
            c.crackTimer = 1;
            Campfire.modules.particles.goldenBurst(c.x, c.y, 15);
            Campfire.audio?.rescue();
            // Apply powerup
            const abilityNames = Campfire.modules.dialogue.DIALOGUE.names;
            const abilityName = abilityNames[Math.floor(Math.random() * abilityNames.length)];
            r.powerup.type = c.ability;
            r.powerup.timer = 15;
            r.powerup.text = abilityName + ' the ' + c.ability;
            Campfire.modules.economy.showMessage(abilityName + ' the ' + c.ability + this._ft(' joins the light!', ' joins the void!'));
            this.showRunMessage(abilityName + ' breaks free!');
            // Guardian: add shield hits
            if (c.ability === 'Guardian') r.powerup.shieldHits = 3;
            if (c.ability === 'Beacon') r.powerup.timer = 20;
          }
          break;
        }
      }
    }

    // --- UPDATE ENEMIES ---
    for (let i = r.enemies.length - 1; i >= 0; i--) {
      const e = r.enemies[i];
      e.t += dt;
      e.hitFlash = Math.max(0, e.hitFlash - dt);

      // Movement
      let moveY = e.speed * dt;
      if (e.type === 'shade') {
        e.x += Math.sin(e.t * 4) * 80 * dt;
      }
      if (e.type === 'darkknight') {
        // Boss moves toward group center
        moveY = e.speed * dt;
      }
      e.y += moveY;

      // Voidling dims nearby (visual only — via powerup check later)
      // Contact with group
      if (e.y > 680 && Math.abs(e.x - r.playerX) < Math.min(80, 50 + r.group.length * 2)) {
        if (r.powerup.type === 'Guardian' && r.powerup.shieldHits > 0) {
          r.powerup.shieldHits--;
          r.shake = Math.max(r.shake, 4);
          Campfire.audio?.hit();
          r.enemies.splice(i, 1);
          if (r.powerup.shieldHits <= 0) r.powerup.type = null;
        } else if (r.invincible > 0) {
          r.enemies.splice(i, 1); // pass through while invincible
        } else {
          this.removeSouls(e.kills);
          Campfire.modules.particles.fireBurst(e.x, e.y, 4);
          r.enemies.splice(i, 1);
        }
        continue;
      }

      // Off screen bottom
      if (e.y > 880) {
        r.enemies.splice(i, 1);
      }
    }

    // --- UPDATE GATES ---
    for (let i = r.gates.length - 1; i >= 0; i--) {
      const g = r.gates[i];
      g.y += r.scrollSpeed * dt;
      g.pulse = Math.max(0, (g.pulse || 0) - dt * 2);

      // Group runs through gate
      if (g.active && Math.abs(700 - g.y) < 20 && Math.abs(r.playerX - g.x) < 65) {
        g.active = false;
        const passive = r._hero?.passive;
        // broker_bribe active: skip this gate entirely
        if (r.activePending) {
          r.activePending = false;
          this.showRunMessage('Gate bypassed.');
        } else if (g.val > 0) {
          // gateBoost passive: positive gates give more
          let val = g.val;
          if (passive?.key === 'gateBoost') val = Math.ceil(val * (1 + passive.value));
          const newNames = [];
          for (let j = 0; j < val; j++) newNames.push(this.addSoul());
          if (newNames.length === 1) {
            this.showRunMessage(newNames[0] + this._ft(' joins the light.', ' joins the void.'));
          } else {
            this.showRunMessage(newNames[0] + ' and ' + (newNames.length - 1) + this._ft(' others join the light.', ' others join the void.'));
          }
          r.flash = 0.15;
          r.flashColor = '#ffd700';
          r.shake = Math.max(r.shake, 4);
          Campfire.audio?.rescue();
        } else if (g.val < 0) {
          // gateSkip: first negative gate is free
          if (passive?.key === 'gateSkip' && !r._gateSkipUsed) {
            r._gateSkipUsed = true;
            this.showRunMessage('Shepherd guided you past the void.');
          } else {
            // darkGate: reduce negative gate cost
            let loss = Math.abs(g.val);
            if (passive?.key === 'darkGate') loss = Math.max(1, Math.floor(loss * passive.value));
            this.removeSouls(loss);
          }
        }
      }

      if (g.y > 880) r.gates.splice(i, 1);
    }

    // --- UPDATE COCOONS ---
    for (let i = r.cocoons.length - 1; i >= 0; i--) {
      const c = r.cocoons[i];
      c.y += r.scrollSpeed * dt;
      if (!c.active && c.crackTimer > 0) c.crackTimer -= dt;
      if (c.y > 880) r.cocoons.splice(i, 1);
    }

    // --- UPDATE PICKUPS (coin/gem visuals) ---
    for (let i = r.pickups.length - 1; i >= 0; i--) {
      const pk = r.pickups[i];
      pk.y += pk.vy * dt;
      pk.life -= dt;
      if (pk.life <= 0) r.pickups.splice(i, 1);
    }
  },

  draw(ctx, W, H) {
    const r = this.run;
    if (!r) return;

    // Background
    ctx.fillStyle = '#0a0a12';
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    // Screen shake
    if (r.shake > 0) {
      ctx.translate((Math.random() - 0.5) * r.shake, (Math.random() - 0.5) * r.shake);
    }

    // Background parallax (bg_far = ruins, scrolls at 0.2x)
    const _spr = Campfire.modules.sprites;
    if (_spr.ready('bg_far')) {
      const img = _spr.S.bg_far;
      const imgH = Math.round(W * img.naturalHeight / img.naturalWidth) || H;
      const startY = -(r.bgFarOffset % imgH);
      for (let y = startY; y < H; y += imgH) ctx.drawImage(img, 0, y, W, imgH);
    } else {
      const stars = Campfire.game.stars;
      if (stars) {
        stars.forEach(s => {
          ctx.fillStyle = `rgba(255,255,255,${s.a * 0.5})`;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r * 0.7, 0, Math.PI * 2);
          ctx.fill();
        });
      }
    }

    // Road
    const roadL = W / 2 - 140;
    const roadR = W / 2 + 140;
    ctx.fillStyle = '#1e1e2c';
    ctx.fillRect(roadL, 0, 280, H);

    // Road surface texture (bg_mid, scrolls at 0.5x)
    if (_spr.ready('bg_mid')) {
      const img = _spr.S.bg_mid;
      const imgH = Math.round(280 * img.naturalHeight / img.naturalWidth) || H;
      const startY = -(r.bgMidOffset % imgH);
      ctx.save();
      ctx.beginPath();
      ctx.rect(roadL, 0, 280, H);
      ctx.clip();
      for (let y = startY; y < H; y += imgH) ctx.drawImage(img, roadL, y, 280, imgH);
      ctx.restore();
    }

    // Road edges
    ctx.strokeStyle = '#3a3a50';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(roadL, 0); ctx.lineTo(roadL, H);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(roadR, 0); ctx.lineTo(roadR, H);
    ctx.stroke();

    // Dashed center line (scrolling)
    ctx.strokeStyle = '#32324a';
    ctx.setLineDash([20, 20]);
    ctx.lineDashOffset = -r.roadOffset;
    ctx.beginPath();
    ctx.moveTo(W / 2, 0);
    ctx.lineTo(W / 2, H);
    ctx.stroke();
    ctx.setLineDash([]);

    // --- DRAW GATES ---
    for (const g of r.gates) {
      if (!g.active) continue;
      const glow = g.pulse || 0;
      const gateKey = g.isRed ? 'gate_red' : 'gate_green';
      if (_spr.ready(gateKey)) {
        ctx.save();
        ctx.globalAlpha = Math.min(1, 0.85 + glow);
        ctx.drawImage(_spr.S[gateKey], g.x - 55, g.y - 18, 110, 36);
        ctx.restore();
      } else {
        if (g.isRed) {
          ctx.fillStyle = g.canShoot ? `rgba(200,120,0,${0.7 + glow})` : `rgba(180,30,30,${0.7 + glow})`;
        } else {
          ctx.fillStyle = `rgba(200,170,50,${0.7 + glow})`;
        }
        ctx.fillRect(g.x - 55, g.y - 18, 110, 36);
        ctx.strokeStyle = g.isRed ? (g.canShoot ? '#cc8800' : '#aa2020') : '#daa520';
        ctx.lineWidth = 2;
        ctx.strokeRect(g.x - 55, g.y - 18, 110, 36);
      }
      // Number always on top
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 22px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText((g.val > 0 ? '+' : '') + g.val, g.x, g.y + 8);
    }

    // --- DRAW COCOONS ---
    for (const c of r.cocoons) {
      if (c.active) {
        // Faint golden glow (always drawn)
        const gg = ctx.createRadialGradient(c.x, c.y, 5, c.x, c.y, 35);
        gg.addColorStop(0, 'rgba(255,220,100,0.25)');
        gg.addColorStop(1, 'rgba(255,180,50,0)');
        ctx.fillStyle = gg;
        ctx.beginPath();
        ctx.arc(c.x, c.y, 35, 0, Math.PI * 2);
        ctx.fill();
        // Cocoon body
        if (_spr.ready('cocoon')) {
          ctx.globalCompositeOperation = 'screen';
          ctx.drawImage(_spr.S.cocoon, c.x - 22, c.y - 28, 44, 56);
          ctx.globalCompositeOperation = 'source-over';
        } else {
          ctx.fillStyle = '#1a0a2a';
          ctx.beginPath();
          ctx.ellipse(c.x, c.y, 22, 28, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        // HP and ability text always on top
        ctx.fillStyle = '#ffd700';
        ctx.font = '14px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(c.hp, c.x, c.y + 5);
        ctx.fillStyle = '#aaa';
        ctx.font = '10px sans-serif';
        ctx.fillText(c.ability, c.x, c.y - 32);
      }
    }

    // --- DARKNESS OVERLAY (fog of war) — drawn before characters so they sit on top ---
    const lightRadius = (r.powerup.type === 'Beacon' ? 300 : 220) + r.group.length * 5;
    const groupCx = r.playerX;
    const groupCy = 700;
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(0, 0, W, H);
    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    const fogG = ctx.createRadialGradient(groupCx, groupCy, 20, groupCx, groupCy, lightRadius);
    fogG.addColorStop(0, 'rgba(0,0,0,1)');
    fogG.addColorStop(0.9, 'rgba(0,0,0,0.3)');
    fogG.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = fogG;
    ctx.beginPath();
    ctx.arc(groupCx, groupCy, lightRadius, 0, Math.PI * 2);
    ctx.fill();
    for (const g of r.gates) {
      if (!g.active) continue;
      const gg2 = ctx.createRadialGradient(g.x, g.y, 0, g.x, g.y, 90);
      gg2.addColorStop(0, 'rgba(0,0,0,0.8)');
      gg2.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gg2;
      ctx.beginPath();
      ctx.arc(g.x, g.y, 90, 0, Math.PI * 2);
      ctx.fill();
    }
    for (const c of r.cocoons) {
      if (!c.active) continue;
      const cg = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, 70);
      cg.addColorStop(0, 'rgba(0,0,0,0.7)');
      cg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = cg;
      ctx.beginPath();
      ctx.arc(c.x, c.y, 70, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    // --- GROUP LIGHT GLOW (on top of fog) ---
    const lg = ctx.createRadialGradient(groupCx, groupCy, 10, groupCx, groupCy, lightRadius);
    lg.addColorStop(0, 'rgba(255,200,100,0.12)');
    lg.addColorStop(0.6, 'rgba(255,160,60,0.04)');
    lg.addColorStop(1, 'rgba(255,120,40,0)');
    ctx.fillStyle = lg;
    ctx.beginPath();
    ctx.arc(groupCx, groupCy, lightRadius, 0, Math.PI * 2);
    ctx.fill();

    // --- DRAW ENEMIES (on top of fog — always visible) ---
    for (const e of r.enemies) {
      ctx.save();
      ctx.globalAlpha = e.alpha || 1;
      const s = e.size;
      if (_spr.ready(e.type)) {
        if (e.hitFlash > 0) ctx.filter = 'brightness(4) saturate(0)';
        ctx.drawImage(_spr.S[e.type], e.x - s, e.y - s, s * 2, s * 2);
        ctx.filter = 'none';
        if (e.type === 'darkknight') {
          ctx.fillStyle = '#300';
          ctx.fillRect(e.x - 50, e.y - s - 15, 100, 8);
          ctx.fillStyle = '#f44';
          ctx.fillRect(e.x - 50, e.y - s - 15, (e.hp / e.maxHp) * 100, 8);
        }
      } else if (e.type === 'darkknight') {
        ctx.fillStyle = e.hitFlash > 0 ? '#886080' : '#1a0812';
        ctx.fillRect(e.x - s, e.y - s, s * 2, s * 2);
        ctx.fillStyle = '#ff2020';
        ctx.beginPath();
        ctx.arc(e.x - s * 0.35, e.y - s * 0.2, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(e.x + s * 0.35, e.y - s * 0.2, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#300';
        ctx.fillRect(e.x - 50, e.y - s - 15, 100, 8);
        ctx.fillStyle = '#f44';
        ctx.fillRect(e.x - 50, e.y - s - 15, (e.hp / e.maxHp) * 100, 8);
      } else {
        ctx.fillStyle = e.hitFlash > 0 ? '#ddddff' : e.color;
        ctx.beginPath();
        ctx.arc(e.x, e.y, s, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = e.type === 'voidling' ? '#6020a0' : '#cc2020';
        ctx.beginPath();
        ctx.arc(e.x - s * 0.25, e.y - s * 0.15, Math.max(1.5, s * 0.12), 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(e.x + s * 0.25, e.y - s * 0.15, Math.max(1.5, s * 0.12), 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    // --- DRAW PROJECTILES (on top of fog) ---
    for (const p of r.projectiles) {
      const gg = ctx.createRadialGradient(p.x, p.y, 1, p.x, p.y, 10);
      gg.addColorStop(0, 'rgba(255,255,200,0.9)');
      gg.addColorStop(1, 'rgba(255,200,80,0)');
      ctx.fillStyle = gg;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffe880';
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, 3, 5, Math.atan2(p.vy, p.vx), 0, Math.PI * 2);
      ctx.fill();
    }

    // --- DRAW SOULS (on top of fog — always visible, 32x40px) ---
    for (const soul of r.group) {
      ctx.shadowBlur = 6;
      ctx.shadowColor = '#ffaa44';
      const soulKey = soul.name ? 'soul_named' : 'soul_normal';
      if (_spr.ready(soulKey)) {
        if (soul.flash > 0) ctx.filter = 'brightness(3) saturate(0)';
        ctx.drawImage(_spr.S[soulKey], soul.x - 16, soul.y - 20, 32, 40);
        ctx.filter = 'none';
      } else {
        ctx.fillStyle = soul.flash > 0 ? '#ffffff' : '#ffcc66';
        ctx.beginPath();
        ctx.arc(soul.x, soul.y, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#442200';
        ctx.beginPath();
        ctx.arc(soul.x - 2, soul.y - 1, 1.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(soul.x + 2, soul.y - 1, 1.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ff6600';
        ctx.beginPath();
        ctx.moveTo(soul.x - 3, soul.y - 8);
        ctx.lineTo(soul.x, soul.y - 16 - Math.random() * 3);
        ctx.lineTo(soul.x + 3, soul.y - 8);
        ctx.fill();
      }
      ctx.shadowBlur = 0;
    }

    // --- PARTICLES (use engine) ---
    Campfire.modules.particles.draw(ctx);

    // --- HUD ---
    // Soul count (big)
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(0, 0, W, 50);
    ctx.fillStyle = '#ffcc66';
    ctx.font = 'bold 24px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(this._ft('SOULS: ', 'SHADES: ') + r.group.length, 15, 35);
    ctx.fillStyle = '#f2cf73';
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(r.coinsEarned + 'C  ' + r.gemsEarned + 'G', W - 15, 35);

    // Powerup indicator
    if (r.powerup.type) {
      ctx.fillStyle = 'rgba(255,200,50,0.2)';
      ctx.fillRect(100, 52, 190, 22);
      ctx.fillStyle = '#ffd700';
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(r.powerup.type + ' ' + Math.ceil(r.powerup.timer) + 's', W / 2, 67);
    }

    // Timer
    ctx.fillStyle = '#888';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(Math.floor(r.timer) + 's', W / 2, H - 15);

    // Active ability button (bottom-right)
    if (r._hero?.active) {
      const abx = W - 55, aby = 780, abw = 70, abh = 44;
      const used = r.activeUsed;
      ctx.fillStyle = used ? 'rgba(60,60,60,0.7)' : (r._hero.faction === 'dark' ? 'rgba(100,20,180,0.55)' : 'rgba(200,120,20,0.55)');
      ctx.beginPath();
      ctx.roundRect(abx - abw / 2, aby - abh / 2, abw, abh, 10);
      ctx.fill();
      ctx.strokeStyle = used ? '#333' : (r._hero.faction === 'dark' ? '#aa44ff' : '#ffaa33');
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.font = '20px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = used ? '#444' : '#fff';
      ctx.fillText(r._hero.icon, abx, aby + 7);
      ctx.font = '9px sans-serif';
      ctx.fillStyle = used ? '#333' : 'rgba(255,255,255,0.6)';
      ctx.fillText(used ? 'USED' : 'ACTIVE', abx, aby + abh / 2 - 2);
    }

    // Boss warning
    if (r.gameState === 'BOSS_WARN') {
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, H / 2 - 40, W, 80);
      ctx.fillStyle = '#ff4444';
      ctx.font = 'bold 28px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('DARKNESS RISING', W / 2, H / 2 + 10);
    }

    // Victory/Gameover overlay
    if (r.gameState === 'VICTORY') {
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#ffd700';
      ctx.font = 'bold 36px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(this._ft('PURIFIED', 'VOID TRIUMPHANT'), W / 2, H / 2 - 20);
      ctx.fillStyle = '#fff';
      ctx.font = '18px sans-serif';
      ctx.fillText(r.group.length + this._ft(' souls carried the light', ' shades consumed the dark'), W / 2, H / 2 + 20);
      ctx.fillText(r.coinsEarned + ' sparks gathered', W / 2, H / 2 + 50);
      // Coin double offer
      if (r.coinDoubleAvailable) {
        const canAfford = Campfire.state.coins >= 3;
        const bx = W / 2, by = H / 2 + 100, bw = 220, bh = 52;
        ctx.fillStyle = canAfford ? 'rgba(255,200,50,0.18)' : 'rgba(80,80,80,0.18)';
        ctx.beginPath();
        ctx.roundRect(bx - bw / 2, by - bh / 2, bw, bh, 10);
        ctx.fill();
        ctx.strokeStyle = canAfford ? '#ffd700' : '#555';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.fillStyle = canAfford ? '#ffd700' : '#666';
        ctx.font = 'bold 17px sans-serif';
        ctx.fillText(canAfford ? '✦ Double Sparks — 3 Credits' : 'Not enough Credits', bx, by + 6);
      } else if (r.coinDoublePending) {
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 16px sans-serif';
        ctx.fillText('✦ Sparks doubled!', W / 2, H / 2 + 110);
      }
    }

    if (r.gameState === 'GAMEOVER') {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#882222';
      ctx.font = 'bold 30px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(this._ft('THE LIGHT FADES', 'THE VOID RECLAIMS YOU'), W / 2, H / 2 - 10);
      ctx.fillStyle = '#aaa';
      ctx.font = '16px sans-serif';
      ctx.fillText(r.coinsEarned + ' sparks recovered', W / 2, H / 2 + 25);
      // Revive offer
      if (r.reviveAvailable) {
        const canAfford = Campfire.state.coins >= 5;
        const bx = W / 2, by = H / 2 + 80, bw = 220, bh = 56;
        ctx.fillStyle = canAfford ? 'rgba(255,160,40,0.2)' : 'rgba(80,80,80,0.18)';
        ctx.beginPath();
        ctx.roundRect(bx - bw / 2, by - bh / 2, bw, bh, 12);
        ctx.fill();
        ctx.strokeStyle = canAfford ? '#ff9933' : '#444';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.fillStyle = canAfford ? '#ffcc66' : '#555';
        ctx.font = 'bold 18px sans-serif';
        ctx.fillText(canAfford ? '✦ Continue — 5 Credits' : 'Not enough Credits', bx, by + 7);
        // Fading timer bar
        const barW = (bw - 20) * Math.max(0, r.endTimer / 2.5);
        ctx.fillStyle = 'rgba(255,150,30,0.35)';
        ctx.fillRect(bx - bw / 2 + 10, by + bh / 2 - 8, barW, 4);
      }
    }

    // Draw run messages (soul names, dialogue)
    if (r.runMessages) {
      r.runMessages.forEach(m => {
        ctx.save();
        ctx.globalAlpha = m.alpha;
        ctx.fillStyle = '#ffd700';
        ctx.font = '14px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(m.text, W / 2, m.y);
        ctx.restore();
      });
    }

    // Screen flash overlay
    if (r.flash > 0) {
      ctx.fillStyle = r.flashColor;
      ctx.globalAlpha = r.flash;
      ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = 1;
    }

    // Message (from economy.showMessage)
    if (Campfire.game.message && Campfire.game.messageTimer > 0) {
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(20, 80, W - 40, 40);
      ctx.fillStyle = '#fff';
      ctx.font = '13px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(Campfire.game.message, W / 2, 105);
    }

    ctx.restore();
  }
});



// ===== TRANSITION HELPER =====
Campfire.transitionTo = function(callback, speed) {
  const tr = Campfire.game.transition;
  tr.active = true;
  tr.alpha = 0;
  tr.direction = "out";
  tr.callback = callback;
  tr.speed = speed || 2.5;
};

// ===== MODULE: Hub (main menu — replaces opening as default entry) =====
Campfire.register('hub', {
  subScene: null, // null=main, 'heroes', 'shop', 'about'
  zones: [],
  heroScroll: 0,
  bestScore: 0,
  _emberPhase: 0,

  init() {
    this.bestScore = parseInt(localStorage.getItem('lf_best_score') || '0');
  },

  recordScore(n) {
    if (n > this.bestScore) {
      this.bestScore = n;
      localStorage.setItem('lf_best_score', n);
    }
  },

  update(dt) {
    this._emberPhase = (this._emberPhase + dt * 0.8) % (Math.PI * 2);
    const inp = Campfire.input;
    if (!inp.pressed) return;
    const x = inp.x, y = inp.y;
    const inZ = (z) => x >= z.x && y >= z.y && x <= z.x + z.w && y <= z.y + z.h;
    for (const z of this.zones) {
      if (inZ(z)) { z.action(); Campfire.audio?.click(); break; }
    }
  },

  draw(ctx, W, H) {
    this.zones = [];
    const addZone = (x, y, w, h, action) => this.zones.push({x,y,w,h,action});

    // --- Background ---
    ctx.fillStyle = '#09060f';
    ctx.fillRect(0, 0, W, H);

    // Stars
    const stars = Campfire.game.stars;
    stars.forEach(s => {
      const twinkle = 0.5 + 0.5 * Math.sin(this._emberPhase * s.s * 3 + s.x);
      ctx.fillStyle = `rgba(255,220,180,${s.a * twinkle})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    });

    // Ambient ground glow
    const glow = ctx.createRadialGradient(W/2, H*0.55, 20, W/2, H*0.55, 280);
    glow.addColorStop(0, `rgba(255,140,40,${0.08 + 0.04 * Math.sin(this._emberPhase)})`);
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, W, H);

    if (this.subScene === 'heroes') { this._drawHeroes(ctx, W, H, addZone); return; }
    if (this.subScene === 'shop')   { this._drawShop(ctx, W, H, addZone); return; }
    if (this.subScene === 'about')  { this._drawAbout(ctx, W, H, addZone); return; }

    // --- MAIN HUB ---

    // Title
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffd580';
    ctx.font = 'bold 42px system-ui';
    ctx.fillText('LIGHTFRONT', W/2, 72);
    ctx.fillStyle = 'rgba(255,180,80,0.55)';
    ctx.font = '14px system-ui';
    ctx.fillText('Survive the Dark. Carry the Light.', W/2, 96);

    // Stats bar
    const state = Campfire.state;
    const barY = 120;
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    this._roundRect(ctx, 20, barY, W - 40, 38, 10);
    ctx.fill();
    ctx.fillStyle = '#ffd580';
    ctx.font = '13px system-ui';
    ctx.textAlign = 'left';
    ctx.fillText(`Lv ${state.level}`, 36, barY + 24);
    ctx.textAlign = 'center';
    ctx.fillText(`🪙 ${state.coins}`, W/2, barY + 24);
    ctx.textAlign = 'right';
    ctx.fillText(`💎 ${state.gems}`, W - 36, barY + 24);
    ctx.textAlign = 'center';

    // PLAY card
    const cardY = 178, cardH = 190;
    const pulse = 0.5 + 0.5 * Math.sin(this._emberPhase * 1.4);
    ctx.fillStyle = `rgba(180,80,20,${0.18 + 0.06 * pulse})`;
    this._roundRect(ctx, 20, cardY, W - 40, cardH, 16);
    ctx.fill();
    ctx.strokeStyle = `rgba(255,160,60,${0.35 + 0.2 * pulse})`;
    ctx.lineWidth = 1.5;
    this._roundRect(ctx, 20, cardY, W - 40, cardH, 16);
    ctx.stroke();

    ctx.fillStyle = 'rgba(255,140,40,0.15)';
    ctx.font = '64px system-ui';
    ctx.fillText('⚔️', W/2, cardY + 72);

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 22px system-ui';
    ctx.fillText('THE GLOOM RUN', W/2, cardY + 105);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '13px system-ui';
    ctx.fillText('Fight through the void. Rescue the lost.', W/2, cardY + 126);

    ctx.fillStyle = 'rgba(255,200,80,0.15)';
    ctx.font = '12px system-ui';
    const bestTxt = this.bestScore > 0 ? `Best: ${this.bestScore} souls rescued` : 'First run — no record yet';
    ctx.fillText(bestTxt, W/2, cardY + 148);

    // PLAY button inside card
    const pbY = cardY + 160, pbH = 40;
    const pbX = W/2 - 80;
    ctx.fillStyle = `rgba(255,160,50,${0.7 + 0.2 * pulse})`;
    this._roundRect(ctx, pbX, pbY, 160, pbH, 10);
    ctx.fill();
    ctx.fillStyle = '#1a0a00';
    ctx.font = 'bold 18px system-ui';
    ctx.fillText('▶  PLAY', W/2, pbY + 27);
    addZone(20, cardY, W - 40, cardH, () => {
      Campfire.transitionTo(() => {
        const ok = Campfire.modules.crowdRunner.startRun();
        if (!ok) { Campfire.game.scene = 'hub'; }
      }, 3);
    });

    // Divider label
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.font = '11px system-ui';
    ctx.fillText('━━━  MORE GAMES  ━━━', W/2, 394);

    // Coming soon cards (2 mini cards)
    const miniW = (W - 56) / 2;
    [['🏰','Realm Wars','Coming Soon'],['🌑','Void Drift','Coming Soon']].forEach(([icon, name, tag], i) => {
      const cx = 20 + i * (miniW + 16), cy = 406, ch = 80;
      ctx.fillStyle = 'rgba(255,255,255,0.04)';
      this._roundRect(ctx, cx, cy, miniW, ch, 12);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.1)';
      ctx.lineWidth = 1;
      this._roundRect(ctx, cx, cy, miniW, ch, 12);
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.font = '28px system-ui';
      ctx.fillText(icon, cx + miniW/2, cy + 36);
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.font = '12px system-ui';
      ctx.fillText(name, cx + miniW/2, cy + 56);
      ctx.fillStyle = 'rgba(255,120,120,0.6)';
      ctx.font = '10px system-ui';
      ctx.fillText(tag, cx + miniW/2, cy + 70);
    });

    // Bottom nav row: Heroes | Shop | About
    const navY = 512, navH = 90, navW = (W - 56) / 3;
    const navItems = [
      { icon: '🦸', label: 'HEROES', action: () => { this.subScene = 'heroes'; } },
      { icon: '🛍️', label: 'SHOP',   action: () => { this.subScene = 'shop'; } },
      { icon: 'ℹ️',  label: 'ABOUT',  action: () => { this.subScene = 'about'; } },
    ];
    navItems.forEach((item, i) => {
      const nx = 20 + i * (navW + 8);
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      this._roundRect(ctx, nx, navY, navW, navH, 14);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.lineWidth = 1;
      this._roundRect(ctx, nx, navY, navW, navH, 14);
      ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.font = '30px system-ui';
      ctx.fillText(item.icon, nx + navW/2, navY + 42);
      ctx.fillStyle = 'rgba(255,220,120,0.8)';
      ctx.font = 'bold 11px system-ui';
      ctx.fillText(item.label, nx + navW/2, navY + 68);
      addZone(nx, navY, navW, navH, item.action);
    });

    // Version
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.font = '10px system-ui';
    ctx.fillText('v0.8.1 · Lightfront', W/2, H - 16);
  },

  _drawHeroes(ctx, W, H, addZone) {
    const state = Campfire.state;
    // Back button
    this._backBtn(ctx, W, addZone, () => { this.subScene = null; });

    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffd580';
    ctx.font = 'bold 22px system-ui';
    ctx.fillText('HEROES', W/2, 54);

    const heroes = state.heroDefs;
    const lightHeroes = heroes.filter(h => h.faction === 'light');
    const darkHeroes  = heroes.filter(h => h.faction === 'dark');

    // Section labels
    ctx.textAlign = 'left';
    ctx.font = 'bold 11px system-ui';
    ctx.fillStyle = '#ffaa33';
    ctx.fillText('⚔ LIGHT SIDE', 24, 82);
    ctx.fillStyle = '#aa44ff';
    ctx.fillText('☠ DARK SIDE', 24, 82 + lightHeroes.length * 148 + 18);

    heroes.forEach((h, i) => {
      const isLight = h.faction === 'light';
      const sectionOffset = isLight ? 0 : lightHeroes.length * 148 + 26;
      const idxInSection = isLight ? lightHeroes.indexOf(h) : darkHeroes.indexOf(h);
      const cardY = 90 + idxInSection * 148 + sectionOffset;
      const cardH = 138;
      const owned = state.heroesOwned[h.key];
      const selected = state.currentHero === h.key;
      const factionColor = isLight ? '#ffaa33' : '#aa44ff';

      ctx.fillStyle = selected
        ? (isLight ? 'rgba(255,170,51,0.13)' : 'rgba(170,68,255,0.13)')
        : 'rgba(255,255,255,0.04)';
      this._roundRect(ctx, 20, cardY, W - 40, cardH, 12);
      ctx.fill();
      ctx.strokeStyle = selected ? factionColor : (owned ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.06)');
      ctx.lineWidth = selected ? 2 : 1;
      this._roundRect(ctx, 20, cardY, W - 40, cardH, 12);
      ctx.stroke();

      // Portrait circle
      ctx.fillStyle = owned ? (h.color || factionColor) : '#2a2a2a';
      ctx.beginPath();
      ctx.arc(62, cardY + 46, 30, 0, Math.PI * 2);
      ctx.fill();
      ctx.font = '22px system-ui';
      ctx.textAlign = 'center';
      ctx.fillStyle = owned ? '#fff' : '#444';
      ctx.fillText(h.icon || '?', 62, cardY + 54);

      // Name + faction tag + desc
      ctx.textAlign = 'left';
      ctx.fillStyle = owned ? '#fff' : 'rgba(255,255,255,0.3)';
      ctx.font = 'bold 15px system-ui';
      ctx.fillText(h.name, 104, cardY + 26);
      ctx.fillStyle = owned ? factionColor : '#444';
      ctx.font = '10px system-ui';
      ctx.fillText(isLight ? '✦ LIGHT' : '✦ DARK', 104, cardY + 40);
      ctx.fillStyle = owned ? 'rgba(255,255,255,0.55)' : 'rgba(255,255,255,0.2)';
      ctx.font = '12px system-ui';
      ctx.fillText(h.passive?.desc || '', 104, cardY + 56);
      ctx.fillStyle = owned ? 'rgba(255,255,255,0.35)' : 'rgba(255,255,255,0.12)';
      ctx.fillText('⚡ ' + (h.active?.desc || ''), 104, cardY + 72);

      // Action button
      ctx.textAlign = 'center';
      const btnX = 112, btnY = cardY + 100, btnW = W - 132, btnH = 34;
      if (selected) {
        ctx.fillStyle = 'rgba(255,180,40,0.4)';
        this._roundRect(ctx, btnX, btnY, btnW, btnH, 8);
        ctx.fill();
        ctx.fillStyle = '#ffd580';
        ctx.font = 'bold 13px system-ui';
        ctx.fillText('✓ ACTIVE', btnX + btnW/2, btnY + 22);
      } else if (owned) {
        ctx.fillStyle = 'rgba(100,200,100,0.3)';
        this._roundRect(ctx, btnX, btnY, btnW, btnH, 8);
        ctx.fill();
        ctx.fillStyle = '#80ff80';
        ctx.font = 'bold 13px system-ui';
        ctx.fillText('SELECT', btnX + btnW/2, btnY + 22);
        addZone(btnX, btnY, btnW, btnH, () => { state.currentHero = h.key; });
      } else {
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        this._roundRect(ctx, btnX, btnY, btnW, btnH, 8);
        ctx.fill();
        ctx.fillStyle = '#ffd580';
        ctx.font = 'bold 13px system-ui';
        const canAfford = state.coins >= h.cost;
        ctx.fillStyle = canAfford ? '#ffd580' : 'rgba(255,255,255,0.3)';
        ctx.fillText(`🪙 ${h.cost}  UNLOCK`, btnX + btnW/2, btnY + 22);
        if (canAfford) {
          addZone(btnX, btnY, btnW, btnH, () => {
            state.coins -= h.cost;
            state.heroesOwned[h.key] = true;
            state.currentHero = h.key;
            state.saveGame?.();
          });
        }
      }
    });
  },

  _drawShop(ctx, W, H, addZone) {
    const state = Campfire.state;
    this._backBtn(ctx, W, addZone, () => { this.subScene = null; });

    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffd580';
    ctx.font = 'bold 22px system-ui';
    ctx.fillText('SHOP', W/2, 54);

    // Balance
    ctx.fillStyle = 'rgba(255,255,255,0.07)';
    this._roundRect(ctx, 20, 68, W-40, 36, 10);
    ctx.fill();
    ctx.fillStyle = '#ffd580';
    ctx.font = '14px system-ui';
    ctx.fillText(`🪙 ${state.coins}  coins    💎 ${state.gems}  gems`, W/2, 91);

    // Upgrades
    ctx.textAlign = 'left';
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = 'bold 11px system-ui';
    ctx.fillText('UPGRADES', 28, 124);

    state.shopDefs.forEach((item, i) => {
      const iy = 132 + i * 76;
      ctx.fillStyle = 'rgba(255,255,255,0.05)';
      this._roundRect(ctx, 20, iy, W-40, 64, 12);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.1)';
      ctx.lineWidth = 1;
      this._roundRect(ctx, 20, iy, W-40, 64, 12);
      ctx.stroke();

      ctx.fillStyle = '#fff';
      ctx.font = 'bold 14px system-ui';
      ctx.fillText(item.name, 36, iy + 22);
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.font = '12px system-ui';
      ctx.fillText(item.desc, 36, iy + 40);

      // Buy button
      ctx.textAlign = 'center';
      const bx = W - 110, bw = 86, bh = 28, by = iy + 18;
      const cost = item.cost > 0 ? item.cost : item.gemCost;
      const currency = item.cost > 0 ? 'coin' : 'gem';
      const symbol = item.cost > 0 ? '🪙' : '💎';
      const balance = item.cost > 0 ? state.coins : state.gems;
      const canAfford = balance >= cost;

      ctx.fillStyle = canAfford ? 'rgba(255,180,40,0.4)' : 'rgba(255,255,255,0.08)';
      this._roundRect(ctx, bx, by, bw, bh, 7);
      ctx.fill();
      ctx.fillStyle = canAfford ? '#ffd580' : 'rgba(255,255,255,0.25)';
      ctx.font = 'bold 12px system-ui';
      ctx.fillText(`${symbol} ${cost}  BUY`, bx + bw/2, by + 19);

      if (canAfford) {
        addZone(bx, by, bw, bh, () => {
          if (item.cost > 0) state.coins -= item.cost;
          else state.gems -= item.gemCost;
          item.apply(state);
          state.saveGame?.();
        });
      }
      ctx.textAlign = 'left';
    });

    // Packs divider
    const packY = 132 + state.shopDefs.length * 76 + 8;
    ctx.textAlign = 'left';
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = 'bold 11px system-ui';
    ctx.fillText('COIN PACKS', 28, packY + 16);

    const packs = [
      { name:'Ember Pack', coins: 100, gems: 0, price:'$0.99', color:'rgba(255,160,40,0.2)' },
      { name:'Blaze Pack', coins: 500, gems: 5, price:'$3.99', color:'rgba(255,100,20,0.2)' },
      { name:'Inferno Pack', coins: 1500, gems: 20, price:'$9.99', color:'rgba(200,40,20,0.25)' },
    ];
    packs.forEach((pack, i) => {
      const py = packY + 24 + i * 68;
      ctx.fillStyle = pack.color;
      this._roundRect(ctx, 20, py, W-40, 58, 12);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,180,80,0.2)';
      ctx.lineWidth = 1;
      this._roundRect(ctx, 20, py, W-40, 58, 12);
      ctx.stroke();
      ctx.fillStyle = '#ffd580';
      ctx.font = 'bold 15px system-ui';
      ctx.fillText(pack.name, 36, py + 22);
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.font = '12px system-ui';
      const detail = pack.gems > 0 ? `🪙 ${pack.coins}  +  💎 ${pack.gems}` : `🪙 ${pack.coins}`;
      ctx.fillText(detail, 36, py + 40);
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(100,200,100,0.4)';
      this._roundRect(ctx, W-120, py+12, 88, 30, 8);
      ctx.fill();
      ctx.fillStyle = '#aaffaa';
      ctx.font = 'bold 14px system-ui';
      ctx.fillText(pack.price, W-76, py + 32);
      ctx.textAlign = 'left';
    });
  },

  _drawAbout(ctx, W, H, addZone) {
    this._backBtn(ctx, W, addZone, () => { this.subScene = null; });
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffd580';
    ctx.font = 'bold 22px system-ui';
    ctx.fillText('ABOUT', W/2, 54);

    const lines = [
      ['LIGHTFRONT', 'bold 28px system-ui', '#ffd580', 140],
      ['A dark fantasy crowd runner.', '15px system-ui', 'rgba(255,255,255,0.7)', 174],
      ['Rescue souls from the void.', '15px system-ui', 'rgba(255,255,255,0.7)', 196],
      ['Carry the light back.', '15px system-ui', 'rgba(255,255,255,0.7)', 218],
      ['', '', '', 240],
      ['HOW TO PLAY', 'bold 13px system-ui', 'rgba(255,200,80,0.8)', 270],
      ['Tap ◀  ▶ to steer your group.', '13px system-ui', 'rgba(255,255,255,0.6)', 292],
      ['Pass through green gates.', '13px system-ui', 'rgba(255,255,255,0.6)', 310],
      ['Avoid red gates and enemies.', '13px system-ui', 'rgba(255,255,255,0.6)', 328],
      ['Save souls from cocoons.', '13px system-ui', 'rgba(255,255,255,0.6)', 346],
      ['Defeat the Dark Knight.', '13px system-ui', 'rgba(255,255,255,0.6)', 364],
      ['', '', '', 380],
      ['CREDITS', 'bold 13px system-ui', 'rgba(255,200,80,0.8)', 408],
      ['Design & Code — The Hive', '13px system-ui', 'rgba(255,255,255,0.5)', 428],
      ['Art — Midjourney v6.1', '13px system-ui', 'rgba(255,255,255,0.5)', 446],
      ['v0.8.1 · kingshotpro.com/games/lightfront', '11px system-ui', 'rgba(255,255,255,0.25)', 480],
    ];
    lines.forEach(([text, font, color, y]) => {
      if (!text) return;
      ctx.font = font;
      ctx.fillStyle = color;
      ctx.fillText(text, W/2, y);
    });
  },

  _backBtn(ctx, W, addZone, action) {
    ctx.textAlign = 'left';
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    this._roundRect(ctx, 16, 16, 64, 32, 8);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,220,120,0.9)';
    ctx.font = 'bold 13px system-ui';
    ctx.fillText('← Back', 26, 37);
    addZone(16, 16, 64, 32, action);
  },

  _roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }
});

// ===== MODULE: Core (must be last) =====
Campfire.register('core', {
  W: 390,
  H: 844,
  currentScene: "hub",
  lastTime: 0,

  init() {
    const W = this.W;
    const H = this.H;
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    Campfire.canvas = canvas;
    Campfire.ctx = ctx;

    Campfire.game = {
      time: 0,
      dt: 1/60,
      scene: "hub",
      fade: 0,
      worldTime: 0,
      dayTime: 0.75, // 0-1 cycle: 0=dawn, 0.25=day, 0.5=dusk, 0.75=night. Start at night.
      dayCycleSpeed: 1/300, // Full cycle in 300 seconds (5 minutes)
      dialogueTimer: 0,
      specialDialogueTimer: 0,
      autosave: 0,
      message: "",
      messageTimer: 0,
      particles: [],
      screenShake: 0,
      stars: Array.from({length: 80}, () => ({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.2 + 0.4,
        a: Math.random() * 0.7 + 0.2,
        s: Math.random() * 0.4 + 0.1
      })),
      open: {
        timer: 0,
        phase: 0,
        stokes: 0,
        fireScale: 0,
        charAlpha: 0,
        lineIndex: 0,
        lines: Campfire.modules.dialogue.DIALOGUE.opening.lines
      },
      topButtons: [],
      bottomButtons: [],
      campgrounds: [],
      mapSignals: [],
      mission: null,
      darkWaving: false,
      transition: { active: false, alpha: 0, direction: "out", callback: null, speed: 2 },
      returnGlow: 0
    };

    this.gameLoop = this.gameLoop.bind(this);
    requestAnimationFrame(this.gameLoop);
  },

  gameLoop(now) {
    const game = Campfire.game;

    if (!this.lastTime) this.lastTime = now;
    let deltaMs = now - this.lastTime;
    this.lastTime = now;

    let dt = Math.min(deltaMs / 1000, 1/30);
    game.dt = dt;
    game.time += dt;
    game.worldTime += dt;
    game.dayTime = (game.dayTime + game.dayCycleSpeed * dt) % 1;

    const input = Campfire.input;

    if (game.scene === "hub") {
      Campfire.modules.hub.update(dt);
    } else if (game.scene === "opening") {
      Campfire.modules.opening.update(dt);
    } else if (game.scene === "camp") {
      Campfire.modules.camp.update(dt);
    } else if (game.scene === "map") {
      Campfire.modules.map.update(dt);
    } else if (game.scene === "mission") {
      Campfire.modules.mission.update(dt);
    } else if (game.scene === "crowdRunner") {
      Campfire.modules.crowdRunner.update(dt);
    }

    Campfire.modules.particles.update(dt);
    input.update();

    const ctx = Campfire.ctx;
    if (game.scene === "hub") {
      Campfire.modules.hub.draw(ctx, this.W, this.H);
    } else if (game.scene === "opening") {
      Campfire.modules.opening.draw(ctx, this.W, this.H);
    } else if (game.scene === "camp") {
      Campfire.modules.camp.draw(ctx, this.W, this.H);
    } else if (game.scene === "map") {
      Campfire.modules.map.draw(ctx, this.W, this.H);
    } else if (game.scene === "mission") {
      Campfire.modules.mission.draw(ctx, this.W, this.H);
    } else if (game.scene === "crowdRunner") {
      Campfire.modules.crowdRunner.draw(ctx, this.W, this.H);
    }

    // === SCENE TRANSITION OVERLAY ===
    const tr = game.transition;
    if (tr.active) {
      if (tr.direction === "out") {
        tr.alpha = Math.min(1, tr.alpha + dt * tr.speed);
        if (tr.alpha >= 1) {
          if (tr.callback) tr.callback();
          tr.callback = null;
          tr.direction = "in";
        }
      } else {
        tr.alpha = Math.max(0, tr.alpha - dt * tr.speed);
        if (tr.alpha <= 0) {
          tr.active = false;
        }
      }
      ctx.fillStyle = `rgba(0, 0, 0, ${tr.alpha})`;
      ctx.fillRect(0, 0, this.W, this.H);
    }

    // === RETURN GLOW (warm pulse when arriving at camp) ===
    if (game.returnGlow > 0) {
      game.returnGlow = Math.max(0, game.returnGlow - dt * 0.8);
      const rg = ctx.createRadialGradient(195, 400, 10, 195, 400, 250);
      rg.addColorStop(0, `rgba(255, 220, 140, ${0.35 * game.returnGlow})`);
      rg.addColorStop(1, "rgba(255, 180, 80, 0)");
      ctx.fillStyle = rg;
      ctx.beginPath();
      ctx.arc(195, 400, 250, 0, Math.PI * 2);
      ctx.fill();
    }

    if (game.autosave > 0) {
      game.autosave -= dt;
      if (game.autosave <= 0) {
        Campfire.state.saveGame();
      }
    }

    requestAnimationFrame(this.gameLoop);
  }
});
