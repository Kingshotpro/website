<script>
var HERO_DATA = {"amadeus": {"name": "Amadeus", "gen": 1, "rarity": "legendary", "troop": "infantry", "rally": "S", "garrison": "B", "bear": "S", "joiner": "A", "f2p": false, "bestUse": "Rally lead & bear hunt", "desc": "One of the strongest offensive heroes in the game. His first skill provides dependable rally value. Remains S-tier for rallies across all generations. Often requires premium investment to fully star up.", "tags": ["rally-lead", "bear", "offensive", "long-term"]}, "jabel": {"name": "Jabel", "gen": 1, "rarity": "legendary", "troop": "cavalry", "rally": "B", "garrison": "S", "bear": "B", "joiner": "-", "f2p": true, "bestUse": "Garrison defender", "desc": "The foundational garrison tank. Extremely robust and available early. Core of any defensive lineup from day one through late game.", "tags": ["garrison", "defensive", "f2p-friendly", "tank"]}, "helga": {"name": "Helga", "gen": 1, "rarity": "legendary", "troop": "infantry", "rally": "A", "garrison": "B", "bear": "B", "joiner": "-", "f2p": false, "bestUse": "Early rally alternative", "desc": "A decent early offensive hero who serves as an Amadeus alternative. Falls off in later generations as stronger rally leads become available.", "tags": ["rally-lead", "offensive", "early-game"]}, "saul": {"name": "Saul", "gen": 1, "rarity": "legendary", "troop": "archer", "rally": "B", "garrison": "A", "bear": "B", "joiner": "S", "f2p": true, "bestUse": "Garrison joiner & stacking", "desc": "An S-tier joiner for garrison defense via stacking. Also invaluable for F2P players due to construction speed boosts. Dual-purpose hero: city management and garrison.", "tags": ["garrison", "joiner", "stacking", "f2p-friendly", "construction"]}, "zoe": {"name": "Zoe", "gen": 2, "rarity": "legendary", "troop": "infantry", "rally": "B", "garrison": "S", "bear": "-", "joiner": "-", "f2p": true, "bestUse": "F2P garrison tank", "desc": "The F2P garrison MVP. Remains viable well into Gen 5-6 with proper support. Her defensive capabilities, damage reduction, and crowd control are unmatched for free players.", "tags": ["garrison", "defensive", "f2p-friendly", "tank", "long-term"]}, "hilde": {"name": "Hilde", "gen": 2, "rarity": "legendary", "troop": "cavalry", "rally": "B", "garrison": "S", "bear": "A", "joiner": "S", "f2p": false, "bestUse": "Garrison joiner & healer", "desc": "A dedicated healer who can also disable enemies briefly. One of the best healers in the game. S-tier joiner for garrison stacking.", "tags": ["garrison", "joiner", "stacking", "healer", "support"]}, "marlin": {"name": "Marlin", "gen": 2, "rarity": "legendary", "troop": "archer", "rally": "S", "garrison": "B", "bear": "B", "joiner": "-", "f2p": true, "bestUse": "Long-term archer carry", "desc": "Excellent ranged damage dealer. A long-term F2P investment \u2014 aim for 465 shards to reach 4-stars quickly when available. Excels in both PvE and PvP, powerful in arena and expedition.", "tags": ["rally-lead", "offensive", "f2p-friendly", "long-term", "arena"]}, "petra": {"name": "Petra", "gen": 3, "rarity": "legendary", "troop": "cavalry", "rally": "S", "garrison": "B", "bear": "B", "joiner": "-", "f2p": true, "bestUse": "Cavalry rally lead", "desc": "The premier cavalry rally lead. Often featured in Hero Roulette events, making her accessible to F2P players. Flexible hero that excels on offense.", "tags": ["rally-lead", "offensive", "cavalry", "f2p-friendly"]}, "eric": {"name": "Eric", "gen": 3, "rarity": "legendary", "troop": "infantry", "rally": "B", "garrison": "S", "bear": "B", "joiner": "-", "f2p": false, "bestUse": "Garrison defender", "desc": "A solid garrison infantry defender who joins the defensive rotation. Reliable but not as impactful as Zoe for F2P players.", "tags": ["garrison", "defensive"]}, "jaeger": {"name": "Jaeger", "gen": 3, "rarity": "legendary", "troop": "archer", "rally": "B", "garrison": "S", "bear": "B", "joiner": "-", "f2p": false, "bestUse": "Garrison archer", "desc": "Garrison-oriented archer who strengthens defensive lineups. Lower priority for F2P players compared to Marlin.", "tags": ["garrison", "defensive"]}, "rosa": {"name": "Rosa", "gen": 4, "rarity": "legendary", "troop": "archer", "rally": "A", "garrison": "B", "bear": "B", "joiner": "-", "f2p": false, "bestUse": "Arena specialist", "desc": "Strong offensive archer and arena specialist. Accessible through specific events. Only invest if you see a clear path to consistent shard collection.", "tags": ["rally-lead", "offensive", "arena"]}, "alcar": {"name": "Alcar", "gen": 4, "rarity": "legendary", "troop": "infantry", "rally": "B", "garrison": "S", "bear": "A", "joiner": "-", "f2p": false, "bestUse": "Garrison infantry", "desc": "Premium garrison infantry defender. Strong in garrison and bear hunt but typically requires significant investment.", "tags": ["garrison", "defensive", "bear"]}, "margot": {"name": "Margot", "gen": 4, "rarity": "legendary", "troop": "cavalry", "rally": "B", "garrison": "S", "bear": "S", "joiner": "A", "f2p": false, "bestUse": "Garrison & bear joiner", "desc": "Excels in garrison defense and bear hunt. A strong joiner who adds depth to both defensive and PvE lineups.", "tags": ["garrison", "joiner", "bear", "defensive"]}, "vivian": {"name": "Vivian", "gen": 5, "rarity": "legendary", "troop": "archer", "rally": "S+", "garrison": "B", "bear": "S", "joiner": "S", "f2p": false, "bestUse": "Army-wide damage buff", "desc": "One of the most impactful heroes in the game. Provides army-wide damage buffs that elevate entire rally lineups. S+ tier for rallies.", "tags": ["rally-lead", "offensive", "bear", "joiner", "buff", "long-term"]}, "thrud": {"name": "Thrud", "gen": 5, "rarity": "legendary", "troop": "cavalry", "rally": "S", "garrison": "A", "bear": "B", "joiner": "-", "f2p": false, "bestUse": "Cavalry multiplier", "desc": "A powerful cavalry multiplier who amplifies cavalry-heavy rally compositions. Strong on offense with some garrison flexibility.", "tags": ["rally-lead", "offensive", "cavalry"]}, "long-fei": {"name": "Long Fei", "gen": 5, "rarity": "legendary", "troop": "infantry", "rally": "A", "garrison": "S", "bear": "A", "joiner": "-", "f2p": false, "bestUse": "Garrison infantry", "desc": "Late-game garrison infantry specialist. Strong across garrison and bear hunt. A premium investment for defensive players.", "tags": ["garrison", "defensive", "bear"]}, "yang": {"name": "Yang", "gen": 6, "rarity": "legendary", "troop": "archer", "rally": "S+", "garrison": "B", "bear": "S", "joiner": "-", "f2p": true, "bestUse": "F2P rally carry", "desc": "The F2P late-game MVP. Provides significant rally impact and is accessible through challenging events, alliance activities, and daily play. Prioritize saving shards for Yang from Gen 5 onward.", "tags": ["rally-lead", "offensive", "f2p-friendly", "long-term"]}, "sophia": {"name": "Sophia", "gen": 6, "rarity": "legendary", "troop": "cavalry", "rally": "S", "garrison": "A", "bear": "B", "joiner": "-", "f2p": false, "bestUse": "Confusion-based debuffer", "desc": "A cavalry debuffer who disrupts enemy formations with confusion effects. Strong rally presence with some garrison capability.", "tags": ["rally-lead", "offensive", "cavalry", "debuff"]}, "triton": {"name": "Triton", "gen": 6, "rarity": "legendary", "troop": "infantry", "rally": "A", "garrison": "S", "bear": "A", "joiner": "-", "f2p": false, "bestUse": "Garrison infantry", "desc": "The strongest frontline unit in Gen 6. Dominates garrison defense and is a solid bear hunt contributor.", "tags": ["garrison", "defensive", "bear", "tank"]}, "chenko": {"name": "Chenko", "gen": 1, "rarity": "epic", "troop": "cavalry", "rally": "-", "garrison": "-", "bear": "S", "joiner": "S", "f2p": true, "bestUse": "Best F2P rally joiner", "desc": "His first skill provides dependable rally value \u2014 considered the best rally joiner skill for F2P players. Essential for bear hunt participation.", "tags": ["joiner", "bear", "f2p-friendly", "long-term"]}, "amane": {"name": "Amane", "gen": 1, "rarity": "epic", "troop": "archer", "rally": "-", "garrison": "-", "bear": "S", "joiner": "S", "f2p": true, "bestUse": "Offensive stacking joiner", "desc": "An excellent offensive stacking joiner for bear hunt and rallies. Pairs well with archer-heavy compositions.", "tags": ["joiner", "bear", "stacking", "f2p-friendly"]}, "yeonwoo": {"name": "Yeonwoo", "gen": 1, "rarity": "epic", "troop": "archer", "rally": "-", "garrison": "-", "bear": "S", "joiner": "S", "f2p": true, "bestUse": "Non-chance offensive joiner", "desc": "A reliable joiner whose offensive contribution does not rely on chance mechanics. Consistent value in rally and bear hunt.", "tags": ["joiner", "bear", "f2p-friendly"]}, "gordon": {"name": "Gordon", "gen": 1, "rarity": "epic", "troop": "cavalry", "rally": "B", "garrison": "-", "bear": "-", "joiner": "A", "f2p": true, "bestUse": "Early-game reliable", "desc": "A reliable early-game hero who provides decent value until stronger options become available.", "tags": ["early-game", "f2p-friendly", "joiner"]}, "howard": {"name": "Howard", "gen": 1, "rarity": "epic", "troop": "infantry", "rally": "-", "garrison": "B", "bear": "-", "joiner": "-", "f2p": true, "bestUse": "Garrison only", "desc": "Limited utility \u2014 garrison only. Quickly outclassed by Gen 2+ heroes. Low priority for investment.", "tags": ["garrison", "early-game", "f2p-friendly"]}, "quinn": {"name": "Quinn", "gen": 1, "rarity": "epic", "troop": "archer", "rally": "-", "garrison": "-", "bear": "-", "joiner": "-", "f2p": true, "bestUse": "Low priority", "desc": "Low boost value with limited combat utility. Not recommended for significant investment.", "tags": ["f2p-friendly", "early-game"]}, "diana": {"name": "Diana", "gen": 1, "rarity": "epic", "troop": "archer", "rally": "-", "garrison": "-", "bear": "-", "joiner": "-", "f2p": true, "bestUse": "Gathering (no battle skills)", "desc": "No battle skills \u2014 she is a gathering hero only. Useful for resource farming with farm accounts but has zero combat value.", "tags": ["gathering", "f2p-friendly", "farm"]}, "fahd": {"name": "Fahd", "gen": 1, "rarity": "epic", "troop": "cavalry", "rally": "-", "garrison": "-", "bear": "D", "joiner": "B", "f2p": true, "bestUse": "Low priority joiner", "desc": "Very low priority. Only use if you have absolutely no other joiner options. Quickly outclassed.", "tags": ["f2p-friendly", "early-game"]}};

function renderCompare() {
  var a = document.getElementById("hero-a").value;
  var b = document.getElementById("hero-b").value;
  var el = document.getElementById("compare-result");
  if (!a || !b) { el.innerHTML = ""; return; }
  if (a === b) { el.innerHTML = '<p style="text-align:center;color:var(--text-muted);">Select two different heroes.</p>'; return; }
  var ha = HERO_DATA[a], hb = HERO_DATA[b];
  if (!ha || !hb) { el.innerHTML = ""; return; }

  function tc(t) { return {"S+":"#fbbf24","S":"#4ade80","A":"#60a5fa","B":"#9ca3af","C":"#f87171","D":"#ef4444"}[t] || "#6b7280"; }
  function tv(t) { return {"S+":6,"S":5,"A":4,"B":3,"C":2,"D":1,"-":0}[t] || 0; }
  function cell(label, va, vb) {
    var ca = tc(va), cb = tc(vb);
    var wina = tv(va) > tv(vb) ? " font-weight:900;" : "";
    var winb = tv(vb) > tv(va) ? " font-weight:900;" : "";
    return '<tr><td style="color:var(--text-muted);">' + label + '</td>' +
      '<td style="color:' + ca + ';text-align:center;' + wina + '">' + (va||"—") + '</td>' +
      '<td style="color:' + cb + ';text-align:center;' + winb + '">' + (vb||"—") + '</td></tr>';
  }

  var html = '<table style="width:100%;border-collapse:collapse;margin:20px 0;">';
  html += '<thead><tr><th style="text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text-muted);font-size:12px;"></th>';
  html += '<th style="text-align:center;padding:8px 12px;border-bottom:1px solid var(--border);color:var(--gold);font-size:15px;"><a href="' + a + '/" style="color:var(--gold);">' + ha.name + '</a></th>';
  html += '<th style="text-align:center;padding:8px 12px;border-bottom:1px solid var(--border);color:var(--gold);font-size:15px;"><a href="' + b + '/" style="color:var(--gold);">' + hb.name + '</a></th>';
  html += '</tr></thead><tbody>';
  html += '<tr><td style="color:var(--text-muted);padding:6px 12px;">Generation</td><td style="text-align:center;">' + ha.gen + '</td><td style="text-align:center;">' + hb.gen + '</td></tr>';
  html += '<tr><td style="color:var(--text-muted);padding:6px 12px;">Troop</td><td style="text-align:center;">' + ha.troop + '</td><td style="text-align:center;">' + hb.troop + '</td></tr>';
  html += '<tr><td style="color:var(--text-muted);padding:6px 12px;">Rarity</td><td style="text-align:center;">' + ha.rarity + '</td><td style="text-align:center;">' + hb.rarity + '</td></tr>';
  html += '<tr><td style="color:var(--text-muted);padding:6px 12px;">F2P</td><td style="text-align:center;">' + (ha.f2p ? "Yes" : "No") + '</td><td style="text-align:center;">' + (hb.f2p ? "Yes" : "No") + '</td></tr>';
  html += cell("Rally", ha.rally, hb.rally);
  html += cell("Garrison", ha.garrison, hb.garrison);
  html += cell("Bear Hunt", ha.bear, hb.bear);
  html += cell("Joiner", ha.joiner, hb.joiner);
  html += '</tbody></table>';

  html += '<div style="display:flex;gap:16px;margin-top:16px;flex-wrap:wrap;">';
  html += '<div style="flex:1;min-width:250px;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:16px;">';
  html += '<div style="color:var(--gold);font-weight:700;margin-bottom:8px;">' + ha.name + '</div>';
  html += '<div style="font-size:13px;color:var(--text-muted);line-height:1.7;">' + ha.bestUse + '. ' + ha.desc + '</div></div>';
  html += '<div style="flex:1;min-width:250px;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:16px;">';
  html += '<div style="color:var(--gold);font-weight:700;margin-bottom:8px;">' + hb.name + '</div>';
  html += '<div style="font-size:13px;color:var(--text-muted);line-height:1.7;">' + hb.bestUse + '. ' + hb.desc + '</div></div>';
  html += '</div>';

  el.innerHTML = html;
}

document.getElementById("hero-a").addEventListener("change", renderCompare);
document.getElementById("hero-b").addEventListener("change", renderCompare);

(function() {
  var p = new URLSearchParams(window.location.search);
  if (p.get("a")) document.getElementById("hero-a").value = p.get("a");

  renderCompare();
})();
