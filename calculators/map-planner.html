<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map Planner — KingshotPro</title><link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/advisor-orb.css"></head><body>
<nav class="nav"><a class="nav-brand" href="../index.html">KingshotPro</a></nav>
<div class="page"><div class="container">
<div class="page-header"><a class="back-link" href="../index.html">&larr; Home</a><h1>&#128506;&#65039; Map Planner</h1><p>Calculate distances and march times between map coordinates.</p></div>
<div class="calc-layout"><div class="calc-inputs"><h2>Coordinates</h2>
<div class="form-group"><label for="mp-x1">From X</label><input type="number" id="mp-x1" placeholder="0"></div>
<div class="form-group"><label for="mp-y1">From Y</label><input type="number" id="mp-y1" placeholder="0"></div>
<div class="form-group"><label for="mp-x2">To X</label><input type="number" id="mp-x2" placeholder="0"></div>
<div class="form-group"><label for="mp-y2">To Y</label><input type="number" id="mp-y2" placeholder="0"></div>
<div class="form-group"><label for="mp-speed">March speed (%)</label><input type="number" id="mp-speed" value="100" min="1" max="500"></div>
<button class="btn btn-primary btn-full" id="mp-calc-btn">Calculate</button></div>
<div class="calc-results"><h2>Distance &amp; Time</h2><div id="mp-results"><p class="result-placeholder">Enter coordinates and click Calculate.</p></div></div></div>
<div class="ad-slot" data-slot="calc-result-below"></div>
</div></div>
<footer class="footer"><div class="footer-inner"><div><div class="footer-brand">KingshotPro</div><p class="footer-note">Unofficial. Not affiliated with Century Games.</p></div></div></footer>
