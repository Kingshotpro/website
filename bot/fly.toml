# fly.toml — Fly.io deployment for the KingshotPro player-lookup bot.
#
# First-time launch:
#   cd bot
#   fly launch --no-deploy   # follow prompts, keep this file
#   fly deploy
#
# App auto-sleeps when idle (auto_stop_machines), so there's no
# standing cost when nobody's using it. Cold wake is ~4s, first
# Playwright lookup after wake is ~12s.

app = "kingshotpro-bot"
primary_region = "sea"    # Seattle — adjust to your nearest region

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

# Memory bump: Chromium needs real RAM. 512 MB is the floor for Playwright.
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
