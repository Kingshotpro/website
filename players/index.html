<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top Players — KingshotPro</title>
  <meta name="description" content="Global top players across every tracked Kingshot kingdom. Rank by player power, kills, hero power, pet power, Town Center level, and Mystic Trial stage.">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/advisor-orb.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8335376690790226" crossorigin="anonymous"></script>
  <style>
    .tp-header { text-align: center; margin-bottom: 18px; }
    .tp-header h1 { color: var(--gold); margin-bottom: 6px; }

    .tp-stats-row { display: flex; gap: 12px; justify-content: center; margin-bottom: 18px; flex-wrap: wrap; }
    .tp-stat-pill { background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 16px; text-align: center; }
    .tp-stat-pill-val { font-size: 18px; font-weight: 800; color: var(--gold); }
    .tp-stat-pill-lbl { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

    /* Category tabs */
    .tp-tabs {
      display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px;
      padding-bottom: 12px; border-bottom: 1px solid var(--border);
    }
    .tp-tab {
      padding: 8px 14px; background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 6px; font-size: 13px; font-weight: 600; color: var(--text-muted);
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .tp-tab:hover { color: var(--text); border-color: var(--gold); }
    .tp-tab.active { background: var(--gold); color: var(--bg); border-color: var(--gold); }

    .tp-search { display: flex; gap: 8px; max-width: 420px; margin: 0 auto 16px; }
    .tp-search input {
      flex: 1; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 14px; font-family: inherit;
    }
    .tp-search input:focus { outline: none; border-color: var(--gold); }

    .tp-kingdom-filter {
      display: flex; flex-wrap: wrap; gap: 4px; justify-content: center;
      margin-bottom: 16px; font-size: 11px;
    }
    .tp-kf-chip {
      padding: 4px 10px; background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 4px; color: var(--text-muted); cursor: pointer; font-weight: 600;
    }
    .tp-kf-chip.active { background: rgba(240,192,64,0.15); color: var(--gold); border-color: var(--gold); }

    .tp-table-wrap { background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
    .tp-table { width: 100%; border-collapse: collapse; }
    .tp-table th {
      text-align: left; font-size: 11px; color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.5px; padding: 12px 14px; border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    .tp-table td { padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 14px; }
    .tp-table tbody tr { transition: background 0.15s; }
    .tp-table tbody tr:hover { background: rgba(240, 192, 64, 0.06); }

    .tp-rank { color: var(--text-muted); font-weight: 700; width: 40px; text-align: center; }
    .tp-rank.top3 { color: var(--gold); font-size: 16px; }
    .tp-name { font-weight: 700; color: var(--text); }
    .tp-tag { color: var(--gold); font-size: 11px; font-weight: 800; margin-right: 6px; background: rgba(240,192,64,0.1); padding: 2px 6px; border-radius: 3px; }
    .tp-value { color: var(--text); font-variant-numeric: tabular-nums; text-align: right; white-space: nowrap; font-weight: 700; }
    .tp-kingdom-cell {
      color: #60a5fa; font-weight: 700; font-size: 13px; white-space: nowrap;
      text-decoration: none;
    }
    .tp-kingdom-cell:hover { text-decoration: underline; }
    .tp-bar { width: 70px; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; display: inline-block; vertical-align: middle; margin-left: 8px; }
    .tp-bar-fill { height: 100%; background: var(--gold); border-radius: 3px; }

    .tp-empty { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 14px; }
    .tp-disclaimer {
      background: rgba(96,165,250,0.08); border: 1px solid rgba(96,165,250,0.25); border-radius: 8px;
      padding: 10px 14px; margin-bottom: 14px; font-size: 12px; color: var(--text-muted);
    }

    @media (max-width: 640px) {
      .tp-table th:nth-child(4), .tp-table td:nth-child(4) { display: none; }
      .tp-table td { padding: 10px 8px; font-size: 13px; }
      .tp-tab { font-size: 12px; padding: 6px 10px; }
      .tp-bar { display: none; }
    }
  </style>
</head>
<body>
<nav class="nav"><a class="nav-brand" href="../index.html">KingshotPro</a></nav>
<div class="page"><div class="container" style="max-width:1000px;">

  <div class="tp-header">
    <h1>Top Players — Global Rankings</h1>
    <p class="text-muted">Cross-kingdom leaderboards pulled from live in-game data. Click a kingdom number to view that kingdom's full rankings.</p>
  </div>

  <div class="tp-stats-row" id="tp-stats"></div>

  <div class="tp-disclaimer" id="tp-disclaimer"></div>

  <div class="ad-slot" data-slot="players-top">Ad</div>

  <div class="tp-tabs" id="tp-tabs"></div>

  <div class="tp-search">
    <input type="text" id="tp-search" placeholder="Search player or alliance tag...">
  </div>

  <div class="tp-kingdom-filter" id="tp-kfilter"></div>

  <div class="tp-table-wrap">
    <table class="tp-table" id="tp-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Player</th>
          <th style="text-align:right;" id="tp-value-header">Value</th>
          <th style="text-align:center;">Kingdom</th>
        </tr>
      </thead>
      <tbody id="tp-tbody"></tbody>
    </table>
  </div>

  <div class="ad-slot" data-slot="players-bottom">Ad</div>

</div></div>

<footer class="footer"><div class="footer-inner">
  <div><div class="footer-brand">KingshotPro</div>
  <p class="footer-note">Unofficial. Not affiliated with Century Games.</p></div>
  <div class="footer-links">
    <a href="../about.html">About</a>
    <a href="../privacy.html">Privacy Policy</a>
    <a href="../terms.html">Terms of Service</a>
  </div>
</div></footer>

<script src="../js/cookie-consent.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/advisor-names.js"></script>
<script src="../js/advisor.js"></script>
<script src="../js/advisor-orb.js"></script>
<script src="../js/advisor-hooks.js"></script>
<script src="../js/advisor-chat.js"></script>
<script src="../js/advisor-cta.js"></script>
<script src="../js/advisor-lore.js"></script>
<script src="../js/advisor-referral.js"></script>
<script src="../js/advisor-alliance.js"></script>
<script src="../js/advisor-accounts.js"></script>
<script>
// Top Players directory — loaded from players_data.json
// Generated by: python3 players/build_players.py
// NEVER hand-edit this data.

var CATEGORY_META = {
  personal_power:       { label: 'Player Power',     icon: '💪', valueLabel: 'Power',         format: 'power' },
  kill_count:           { label: 'Kill Count',       icon: '⚔️', valueLabel: 'Kills',         format: 'number' },
  hero_power:           { label: 'Top Hero Power',   icon: '🦸', valueLabel: 'Strongest Hero',format: 'power' },
  heros_total_power:    { label: 'All Heroes Total', icon: '📊', valueLabel: 'Sum of 5 Heroes',format: 'power' },
  total_pet_power:      { label: 'Pet Power',        icon: '🐉', valueLabel: 'Pet Power',     format: 'power' },
  town_center_level:    { label: 'Town Center',      icon: '🏰', valueLabel: 'TC Level',      format: 'level' },
  mystic_trial:         { label: 'Mystic Trial',     icon: '🔮', valueLabel: 'Highest Stage', format: 'level' },
  rebel_conquest_stage: { label: 'Rebel Conquest',   icon: '🛡️', valueLabel: 'Stage Reached', format: 'level' },
};

var TAB_ORDER = [
  'personal_power', 'kill_count', 'hero_power', 'heros_total_power',
  'total_pet_power', 'town_center_level', 'mystic_trial', 'rebel_conquest_stage'
];

var DATA = null;
var currentCat = 'personal_power';
var search = '';
var kingdomFilter = null; // null = all

function formatPower(p) {
  if (p >= 1e9) return (p / 1e9).toFixed(2) + 'B';
  if (p >= 1e6) return (p / 1e6).toFixed(1) + 'M';
  if (p >= 1e3) return (p / 1e3).toFixed(1) + 'K';
  return p.toLocaleString();
}

function formatValue(v, fmt) {
  if (fmt === 'power') return formatPower(v);
  if (fmt === 'number') return v.toLocaleString();
  if (fmt === 'level') return v.toLocaleString();
  return v.toLocaleString();
}

function renderTabs() {
  var el = document.getElementById('tp-tabs');
  el.innerHTML = '';
  TAB_ORDER.forEach(function (cat) {
    if (!DATA.categories[cat] || DATA.categories[cat].length === 0) return;
    var meta = CATEGORY_META[cat];
    var btn = document.createElement('div');
    btn.className = 'tp-tab' + (cat === currentCat ? ' active' : '');
    btn.innerHTML = meta.icon + ' ' + meta.label + ' <span style="opacity:0.6;font-weight:500;">(' + DATA.categories[cat].length + ')</span>';
    btn.onclick = function () {
      currentCat = cat;
      document.querySelectorAll('.tp-tab').forEach(function (t) { t.classList.remove('active'); });
      btn.classList.add('active');
      document.getElementById('tp-value-header').textContent = CATEGORY_META[cat].valueLabel;
      renderTable();
    };
    el.appendChild(btn);
  });
  document.getElementById('tp-value-header').textContent = CATEGORY_META[currentCat].valueLabel;
}

function renderKingdomFilter() {
  var el = document.getElementById('tp-kfilter');
  el.innerHTML = '';
  var allChip = document.createElement('span');
  allChip.className = 'tp-kf-chip' + (kingdomFilter === null ? ' active' : '');
  allChip.textContent = 'All Kingdoms';
  allChip.onclick = function () { kingdomFilter = null; renderKingdomFilter(); renderTable(); };
  el.appendChild(allChip);
  DATA.kingdoms_covered.forEach(function (kid) {
    var chip = document.createElement('span');
    chip.className = 'tp-kf-chip' + (kingdomFilter === kid ? ' active' : '');
    chip.textContent = 'K' + kid;
    chip.onclick = function () { kingdomFilter = kid; renderKingdomFilter(); renderTable(); };
    el.appendChild(chip);
  });
}

function renderTable() {
  var tbody = document.getElementById('tp-tbody');
  tbody.innerHTML = '';
  var entries = (DATA.categories[currentCat] || []).slice();

  if (kingdomFilter !== null) {
    entries = entries.filter(function (e) { return e.kingdom === kingdomFilter; });
  }

  if (search) {
    var q = search.toLowerCase();
    entries = entries.filter(function (e) {
      return (e.name || '').toLowerCase().indexOf(q) !== -1
          || (e.tag || '').toLowerCase().indexOf(q) !== -1;
    });
  }

  if (entries.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" class="tp-empty">No players match this filter.</td></tr>';
    return;
  }

  var maxValue = entries[0].value;
  var fmt = CATEGORY_META[currentCat].format;

  entries.forEach(function (e, i) {
    var pct = maxValue > 0 ? (e.value / maxValue * 100).toFixed(1) : 0;
    var tr = document.createElement('tr');
    var rankCls = 'tp-rank' + (i < 3 ? ' top3' : '');
    var rankMark = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1);
    var nameHtml = (e.tag ? '<span class="tp-tag">[' + escapeHtml(e.tag) + ']</span>' : '') + escapeHtml(e.name);
    tr.innerHTML =
      '<td class="' + rankCls + '">' + rankMark + '</td>' +
      '<td class="tp-name">' + nameHtml + '</td>' +
      '<td class="tp-value">' + formatValue(e.value, fmt) +
        (fmt === 'power' || fmt === 'number' ? '<div class="tp-bar"><div class="tp-bar-fill" style="width:' + pct + '%"></div></div>' : '') +
      '</td>' +
      '<td style="text-align:center;"><a class="tp-kingdom-cell" href="../kingdoms/' + e.kingdom + '/">K' + e.kingdom + ' →</a></td>';
    tbody.appendChild(tr);
  });
}

function renderStats() {
  var el = document.getElementById('tp-stats');
  var totalPlayers = 0;
  var seen = {};
  Object.keys(DATA.categories).forEach(function (cat) {
    DATA.categories[cat].forEach(function (e) {
      var key = e.kingdom + '|' + e.name;
      if (!seen[key]) { seen[key] = 1; totalPlayers++; }
    });
  });
  el.innerHTML =
    '<div class="tp-stat-pill"><div class="tp-stat-pill-val">' + DATA.kingdoms_covered.length + '</div><div class="tp-stat-pill-lbl">Kingdoms Tracked</div></div>' +
    '<div class="tp-stat-pill"><div class="tp-stat-pill-val">' + totalPlayers.toLocaleString() + '</div><div class="tp-stat-pill-lbl">Unique Players</div></div>' +
    '<div class="tp-stat-pill"><div class="tp-stat-pill-val">8</div><div class="tp-stat-pill-lbl">Leaderboard Categories</div></div>';

  var dates = Object.values(DATA.updated_per_kingdom || {}).sort();
  var disc = document.getElementById('tp-disclaimer');
  if (dates.length) {
    disc.innerHTML = 'Data sourced via KingshotPro scraper across ' + DATA.kingdoms_covered.length + ' kingdoms. Scrape timestamps range from <strong>' + dates[0] + '</strong> to <strong>' + dates[dates.length - 1] + '</strong>. Name parsing is OCR-based and may contain artifacts on some entries.';
  } else {
    disc.style.display = 'none';
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, function (c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}

document.getElementById('tp-search').addEventListener('input', function (e) {
  search = e.target.value.trim();
  renderTable();
});

fetch('players_data.json')
  .then(function (r) { return r.json(); })
  .then(function (data) {
    DATA = data;
    renderStats();
    renderTabs();
    renderKingdomFilter();
    renderTable();
  })
  .catch(function (err) {
    document.getElementById('tp-tbody').innerHTML = '<tr><td colspan="4" class="tp-empty">Failed to load player data. Try refreshing.</td></tr>';
    console.error(err);
  });
</script>
<script src="../js/credits.js"></script>
</body>
</html>
