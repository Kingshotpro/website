<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alliance Directory - KingshotPro</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/advisor-orb.css">
    <script src="../scripts/cookie-consent.js"></script>
    <script src="../scripts/layout.js"></script>
    <script src="../scripts/advisor-names.js"></script>
    <script src="../scripts/advisor.js"></script>
    <script src="../scripts/advisor-orb.js"></script>
    <script src="../scripts/advisor-hooks.js"></script>
    <script src="../scripts/advisor-chat.js"></script>
    <script src="../scripts/advisor-cta.js"></script>
    <script src="../scripts/advisor-lore.js"></script>
    <script src="../scripts/advisor-referral.js"></script>
    <script src="../scripts/advisor-alliance.js"></script>
    <style>
        body {
            background-color: #1a1a1a;
            color: #f0e68c;
        }
        .nav {
            background-color: #333;
            padding: 10px;
            text-align: center;
        }
        .nav a {
            color: #f0e68c;
            text-decoration: none;
            font-weight: bold;
            margin: 0 15px;
        }
        .search-bar {
            margin: 20px;
            text-align: center;
        }
        .alliance-card {
            background-color: #222;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            margin: 10px;
            transition: transform 0.2s;
        }
        .alliance-card:hover {
            transform: scale(1.05);
        }
        .featured-badge {
            background-color: gold;
            color: black;
            padding: 5px;
            border-radius: 5px;
            font-weight: bold;
            position: absolute;
            top: 10px;
            right: 10px;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        @media (max-width: 600px) {
            .card-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8335376690790226" crossorigin="anonymous"></script>
</head>
<body>
<nav class="nav"><a class="nav-brand" href="../index.html">KingshotPro</a></nav>
    <div class="nav">
        <a href="/">KingshotPro</a>
    </div>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search by kingdom number or alliance tag" onkeyup="filterAlliances()">
        <select id="sortSelect" onchange="sortAlliances()">
            <option value="credits">Sort by: Most Credits</option>
            <option value="newest">Newest</option>
            <option value="members">Most Members</option>
        </select>
    </div>

    <div class="card-grid" id="allianceList">
        <!-- Alliance cards will be dynamically inserted here -->
    </div>

    <footer>
        <p>&copy; 2023 KingshotPro. All rights reserved.</p>
    </footer>

    <script>
        const alliances = [
            { tag: 'KSP1', kingdom: 101, members: 50, credits: 2000, recruitment: 'Open', featured: true },
            { tag: 'KSP2', kingdom: 102, members: 30, credits: 1500, recruitment: 'Closed', featured: false },
            { tag: 'KSP3', kingdom: 103, members: 70, credits: 3000, recruitment: 'Open', featured: true },
            { tag: 'KSP4', kingdom: 104, members: 20, credits: 1000, recruitment: 'Open', featured: false },
            { tag: 'KSP5', kingdom: 105, members: 10, credits: 500, recruitment: 'Closed', featured: false }
        ];

        function displayAlliances(alliances) {
            const allianceList = document.getElementById('allianceList');
            allianceList.innerHTML = '';
            alliances.forEach(alliance => {
                const card = document.createElement('div');
                card.className = 'alliance-card';
                card.innerHTML = `
                    ${alliance.featured ? '<div class="featured-badge">Featured</div>' : ''}
                    <h3>${alliance.tag}</h3>
                    <p>Kingdom: ${alliance.kingdom}</p>
                    <p>Members: ${alliance.members}</p>
                    <p>Credits: ${alliance.credits}</p>
                    <p>Recruitment: ${alliance.recruitment}</p>
                    <a href="alliance/page.html?tag=${alliance.tag}&k=${alliance.kingdom}">View Alliance</a>
                `;
                allianceList.appendChild(card);
            });
        }

        function filterAlliances() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const filteredAlliances = alliances.filter(alliance => 
                alliance.tag.toLowerCase().includes(input) || 
                alliance.kingdom.toString().includes(input)
            );
            displayAlliances(filteredAlliances);
        }

        function sortAlliances() {
            const sortValue = document.getElementById('sortSelect').value;
            let sortedAlliances;
            if (sortValue === 'credits') {
                sortedAlliances = alliances.sort((a, b) => b.credits - a.credits);
            } else if (sortValue === 'newest') {
                sortedAlliances = alliances; // Placeholder for actual date sorting
            } else if (sortValue === 'members') {
                sortedAlliances = alliances.sort((a, b) => b.members - a.members);
            }
            displayAlliances(sortedAlliances);
        }

        // Initial display
        displayAlliances(alliances);
    </script>
</body>
</html>
